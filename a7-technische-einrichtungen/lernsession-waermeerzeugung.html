<script>
/* ============================================================
   a.7 Wärmeerzeugung. Eine Datei, zwei Modi:
   ?mode=lernpfad (Standard) = Wissensvermittlung: mit Info-Lesetexten,
        Beschriften per Auswahl (zuordnen).
   ?mode=challenge = Prüfung: ohne Info, Beschriften per Eintippen, voll gamifiziert.
   ============================================================ */
var MODE = /[?&]mode=challenge/.test(location.search) ? 'challenge' : 'lernpfad';

var ALL = [
  { kicker:'Einstieg · Folien', title:'Präsentation zur Wärmeerzeugung', type:'pdf',
    lead:'Schauen Sie sich die Folien an, bevor Sie mit den Übungen beginnen.',
    src:'../presentations/02_Waermeerzeugung.pdf' },
  { kicker:'Info · Verbrennung', title:'Verbrennung & Brenner', type:'info',
    lead:'Lesen Sie die Grundlagen, danach prüfen Sie sie.',
    read:
      '<p>Bei der <b>Verbrennung</b> verbinden sich brennbare Stoffe unter Wärme- und Lichtentwicklung mit dem Sauerstoff der Luft (rasche Oxidation). Dafür braucht es drei Dinge: <b>Brennstoff</b>, <b>Sauerstoff</b> und <b>Wärme</b> (Zündung).</p>' +
      '<h4>Öl- und Gasbrenner</h4>' +
      '<ul>' +
        '<li><b>Ölbrenner</b>: Druckzerstäubung. Öl unter Druck durch eine Düse zu Nebel zerstäubt, mit Luft gemischt, elektrisch gezündet.</li>' +
        '<li><b>Gasbrenner</b>: gleich, aber <b>ohne Brennstoffpumpe</b> (Gas steht schon unter Druck). Dafür Sicherheitseinrichtungen gegen Gasaustritt.</li>' +
      '</ul>' +
      '<div class="factbox">Die <b>Verbrennungsluft</b> soll so dosiert sein, dass der Brennstoff vollständig verbrennt. Zu viel oder zu wenig Luft erhöht den Verbrauch und belastet die Umwelt.</div>' },
  { kicker:'Wahr oder Falsch', title:'Verbrennung & Brenner', id:'a_tf', type:'tf',
    lead:'Stimmt die Aussage?',
    items:[
      { s:'Für eine Verbrennung braucht es Brennstoff, Sauerstoff und Wärme.', a:true, e:'Das Verbrennungsdreieck.' },
      { s:'Ölbrenner arbeiten meist nach dem Prinzip der Druckzerstäubung.', a:true, e:'Öl wird durch die Düse zu Nebel zerstäubt.' },
      { s:'Gasbrenner brauchen eine Brennstoffpumpe.', a:false, e:'Das Gas steht bereits unter Druck.' },
      { s:'Zu viel Verbrennungsluft spart Brennstoff.', a:false, e:'Zu viel oder zu wenig Luft erhöht den Verbrauch.' },
      { s:'Bei Gasbrennern sind besondere Sicherheitseinrichtungen gegen Gasaustritt vorgeschrieben.', a:true, e:'Erdgas ist explosionsfähig.' }
    ] },
  { kicker:'Info · Ölbrenner', title:'Ölbrenner: Funktionsweise', type:'info',
    lead:'Wie ein Ölbrenner arbeitet, danach beschriften Sie ihn.',
    read:
      '<p>Der <b>Elektromotor</b> treibt <b>Ventilatorrad</b> und <b>Ölpumpe</b> an. Die Pumpe fördert das Öl unter Druck über das <b>Magnetventil</b> zur <b>Düse</b>, wo es zu Nebel zerrissen wird. Die Verbrennungsluft gelangt über das Ventilatorrad in den <b>Flammkopf</b>.</p>' +
      '<p>Die <b>Zündelektroden</b> erhalten vom <b>Zündtrafo</b> Hochspannung, der Funke entzündet das Gemisch. Der <b>Brennerautomat</b> steuert den Ablauf, der <b>Fotowiderstand</b> überwacht die Flamme.</p>' +
      '<div class="factbox">Merken: <b>Brennerautomat</b> = steuert, <b>Fotowiderstand</b> = überwacht (Flammenwächter).</div>' },
  { kicker:'Beschriften', title:'Ölbrenner beschriften', id:'b_label', type:'label',
    lead:'Ordnen Sie jeder Nummer das richtige Bauteil zu.',
    media:'<img src="images/a.7_Oelbrenner_mit_Nummern.png" alt="Aufbau eines Ölbrenners mit nummerierten Bauteilen">',
    items:[
      { n:1,  name:'Flammkopf',                  keys:['flammkopf','flammenkopf'] },
      { n:2,  name:'Fotowiderstand',             keys:['fotowiderstand','flammenwaechter'] },
      { n:3,  name:'Magnetventil',               keys:['magnetventil'] },
      { n:4,  name:'Zündkabel',                  keys:['zuendkabel','zuendleitung'] },
      { n:5,  name:'Pumpe',                      keys:['pumpe','oelpumpe'] },
      { n:6,  name:'Ölschlauch-Anschluss',       keys:['oelschlauch','anschluss'] },
      { n:7,  name:'Elektromotor',               keys:['elektromotor','motor'] },
      { n:8,  name:'Ventilatorrad',              keys:['ventilatorrad','ventilator','geblaese'] },
      { n:9,  name:'Düsenschaft',                keys:['duesenschaft','duese'] },
      { n:10, name:'Zündelektroden',             keys:['zuendelektroden','elektroden'] },
      { n:11, name:'Zündtrafo',                  keys:['zuendtrafo','zuendtransformator','trafo'] },
      { n:12, name:'Luftansaugkasten',           keys:['luftansaugkasten','ansaugkasten','luftansaug'] },
      { n:13, name:'Skala für Lufteinstellung',  keys:['skala'] },
      { n:14, name:'Drehschieber für Lufteinstellung', keys:['drehschieber'] },
      { n:15, name:'Brennerautomat',             keys:['brennerautomat','automat'] }
    ] },
  { kicker:'Info · Sicherheit', title:'Brenner: Sicherheit & Wartung', type:'info',
    lead:'Worauf es bei Sicherheit, Umwelt und Wartung ankommt.',
    read:
      '<h4>Sicherheit</h4>' +
      '<p>Tritt bei erloschener Flamme Öl in den heissen Feuerraum, kann ein explosives Öldampf-Gemisch entstehen. Schutz:</p>' +
      '<ul>' +
        '<li><b>Flammenwächter (Fotowiderstand)</b>: Fällt die Flamme aus, sperrt der Brennerautomat über das Magnetventil sofort die Ölzufuhr. Den Fotowiderstand sauber halten, verrusst reagiert er nicht.</li>' +
        '<li><b>Gasexplosionsklappen</b> am Feuerraum lassen einen Explosionsdruck ins Heizlokal entweichen.</li>' +
      '</ul>' +
      '<h4>Umwelt & Wartung</h4>' +
      '<ul>' +
        '<li><b>Rauchgasrezirkulation</b> senkt den Ausstoss von Stickstoffoxiden (<b>NOx</b>).</li>' +
        '<li>Der <b>Betreiber</b> darf den Fotowiderstand selbst kontrollieren/reinigen und auf Geruch/Lärm achten. Den Brenner revidiert und stellt ein <b>Fachmann</b> periodisch.</li>' +
        '<li>Die <b>Feuerungskontrolle</b> ist staatlich vorgeschrieben (Luftreinhalteverordnung).</li>' +
      '</ul>' },
  { kicker:'Quiz', title:'Sicherheit & Wartung', id:'c_quiz', type:'quiz',
    lead:'Vier Fragen.',
    questions:[
      { q:'Was passiert, wenn die Flamme während des Betriebs ausfällt?', opts:['Der Brennerautomat sperrt über das Magnetventil die Ölzufuhr','Der Brenner zündet sofort stärker nach','Die Ölpumpe erhöht den Druck'], correct:0 },
      { q:'Womit wird die Flamme überwacht?', opts:['Mit dem Fotowiderstand (Flammenwächter)','Mit dem Druckreduzierventil','Mit dem Ventilatorrad'], correct:0 },
      { q:'Was darf der Anlagenbetreiber selbst tun?', opts:['Den Fotowiderstand kontrollieren und reinigen','Den Brenner neu einstellen','Die Düse austauschen'], correct:0 },
      { q:'Wozu dient die Rauchgasrezirkulation?', opts:['Sie senkt den Ausstoss von Stickstoffoxiden (NOx)','Sie erhöht die Flammentemperatur','Sie spart Zündenergie'], correct:0 }
    ] },
  { kicker:'Info · Dampfkessel', title:'Dampfkessel: Grundlagen', type:'info',
    lead:'Wozu Dampf dient und welche Bauarten es gibt.',
    read:
      '<p>Der <b>Dampf</b> dient als Wärmeträger für Käsefertiger, Erhitzer, Desinfektion und Warmwasser. Er hat einen hohen Wärmeinhalt und strömt ohne Pumpe zu den Verbrauchern. Die grosse gespeicherte Energie ist zugleich eine <b>Gefahrenquelle</b> (Kesselexplosion), darum gelten strenge Vorschriften.</p>' +
      '<h4>Bauarten</h4>' +
      '<ul>' +
        '<li><b>Dreizugdampfkessel</b>: Rauchrohrkessel mit Rohren auf drei Höhen, guter Wirkungsgrad (häufig).</li>' +
        '<li><b>Niederdruckdampfkessel</b>: max. <b>0,5 bar</b> Betriebsüberdruck, <b>keine</b> SVTI-Kontrollpflicht.</li>' +
        '<li><b>Schnelldampferzeuger</b>: wenig Wasserinhalt, kurze Anfahrzeit, günstig.</li>' +
      '</ul>' +
      '<div class="factbox">Bei allen Bauarten geben die heissen <b>Rauchgase</b> in Röhren ihre Wärme ans Kesselwasser ab und verlassen den Kessel über das Rauchrohr in den Kamin.</div>' },
  { kicker:'Beschriften', title:'Dreizugdampfkessel beschriften', id:'d_label', type:'label',
    lead:'Ordnen Sie jeder Nummer den richtigen Begriff zu.',
    media:'<img src="images/a.7_Dreizugdampfkessel_mit_Nummern.png" alt="Schema eines Dreizugdampfkessels mit Legende">',
    items:[
      { n:1, name:'Flammrohr',                  keys:['flammrohr'] },
      { n:2, name:'Dampf',                      keys:['dampf'] },
      { n:3, name:'Wasser',                     keys:['wasser','kesselwasser'] },
      { n:4, name:'Feuerbüchse',                keys:['feuerbuechse','feuerbuchse'] },
      { n:5, name:'Wasserumspülte Wendekammer', keys:['wendekammer','wasserumspuelte'] },
      { n:6, name:'Rauchrohr',                  keys:['rauchrohr'] }
    ] },
  { kicker:'Info · Gefahren', title:'Gefahren am Dampfkessel', type:'info',
    lead:'Drei Hauptgefahren und das richtige Verhalten.',
    read:
      '<ul>' +
        '<li><b>Zu grosser Überdruck</b>: Das <b>Sicherheitsventil</b> lässt überschüssigen Druck ab. Ist es verklemmt oder überlastet, kann der Kessel explodieren.</li>' +
        '<li><b>Wassermangel</b>: Wasserstand unter der Minimalmarke → Heizfläche überhitzt, Material reisst (Feuerbüchse beult). <b>Nie kaltes Wasser nachspeisen!</b> Stattdessen Feuerung ausschalten, Sturmleitung öffnen, abkalten lassen. Glühende Heizfläche → Kesselinspektor.</li>' +
        '<li><b>Kesselstein</b>: Kalk/Magnesium aus hartem Wasser lagert sich ab und isoliert die Heizfläche → Überhitzung. Verhindern durch <b>Wasseraufbereitung</b> (Enthärtung/Entsalzung) vor dem Kessel.</li>' +
      '</ul>' +
      '<div class="factbox">Alle drei Gefahren führen über Überhitzung oder Überdruck zur plötzlichen Energiefreigabe. Wartungs- und Bedienungsvorschriften unbedingt einhalten.</div>' },
  { kicker:'Lückentext', title:'Gefahren am Dampfkessel', id:'e_gaps', type:'gaps',
    lead:'Füllen Sie die Lücken.',
    parts:[
      'Die drei Hauptgefahren sind zu grosser ',
      { opts:['Überdruck','Unterdruck','Luftmangel'], correct:0 },
      ', ',
      { opts:['Wassermangel','Ölmangel','Dampfüberschuss'], correct:0 },
      ' und ',
      { opts:['Kesselstein','Rost','Schaum'], correct:0 },
      '. Den Überdruck lässt das ',
      { opts:['Sicherheitsventil','Magnetventil','Mischventil'], correct:0 },
      ' ab. Bei Wassermangel darf man nie ',
      { opts:['kaltes Wasser nachspeisen','die Feuerung erhöhen','den Druck steigern'], correct:0 },
      '. Kesselstein verhindert man durch ',
      { opts:['Wasseraufbereitung','höheren Druck','mehr Brennstoff'], correct:0 },
      ' vor dem Kessel.'
    ] },
  { kicker:'Info · Warmwasser', title:'Warmwasseranlage', type:'info',
    lead:'Aufbau und Regelung der Warmwasseranlage.',
    read:
      '<p>Die Warmwasseranlage ist ein <b>geschlossenes Rohrsystem</b> (ca. 3 bar). Das Wasser wird im Kessel auf <b>80–110 °C</b> erwärmt, von der <b>Umwälzpumpe</b> über den <b>Verteilerbalken</b> zu den Verbrauchern gepumpt und über den <b>Sammelbalken</b> zurückgeführt.</p>' +
      '<ul>' +
        '<li>Das <b>Mischventil</b> stellt die Vorlauftemperatur ein (kühleres Rücklaufwasser beimischen): Abendmilch ca. 30–40 °C, Käsebruch höher.</li>' +
        '<li>Das <b>Ausdehnungs-/Expansionsgefäss</b> nimmt das Mehrvolumen auf, das beim Erwärmen entsteht.</li>' +

/* Challenge = ohne Info-Lesetexte und ohne PDF-Einstieg */
var STATIONS = ALL.filter(function(s){ return MODE === 'challenge' ? (s.type !== 'info' && s.type !== 'pdf') : true; });

(function(){
  var t = (MODE === 'challenge') ? 'Challenge' : 'Lernpfad';
  document.getElementById('pageTitle').textContent = t + ': Wärmeerzeugung';
  document.getElementById('subtitle').textContent = (MODE === 'challenge')
    ? 'Prüfungsmodus – ohne Hilfen, Bauteile eintippen'
    : 'Wissensvermittlung – mit Lesetexten und Übungen';
  document.title = t + ': Wärmeerzeugung (a.7)';
})();

var N = STATIONS.length;
var current = 0;
var solved = [], earned = [], maxPts = [];
for (var i = 0; i < N; i++) { solved[i] = false; earned[i] = 0; maxPts[i] = 0; }
var xp = 0, streak = 0, bestStreak = 0;

function findIdx(id){ for(var i=0;i<N;i++){ if(STATIONS[i].id===id) return i; } return -1; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function shuffleIdx(n){ var a=[]; for(var i=0;i<n;i++) a.push(i); return shuffle(a); }
function fold(s){ return String(s).toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function matchKeys(input, it){ var f=fold(input); if(!f) return false; if(f===fold(it.name)) return true; for(var i=0;i<it.keys.length;i++){ if(f.indexOf(fold(it.keys[i]))!==-1) return true; } return false; }

function renderHud(){
  document.getElementById('hudXp').textContent = xp;
  var sc=0; for(var i=0;i<N;i++){ if(solved[i]) sc++; }
  document.getElementById('hudBar').style.width = Math.round(sc/N*100)+'%';
  document.getElementById('hudStreak').textContent = '🔥 '+streak;
}
function addXp(n){ xp+=n; var el=document.getElementById('hudXp'); renderHud(); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
function registerAnswer(ok){
  if(ok){ streak++; if(streak>bestStreak) bestStreak=streak; addXp(10+(streak>=3?5:0)); var s=document.getElementById('hudStreak'); s.classList.remove('pulse'); void s.offsetWidth; s.classList.add('pulse'); }
  else { streak=0; renderHud(); }
}

function buildAll(){
  var stage=document.getElementById('stage'); stage.innerHTML='';
  STATIONS.forEach(function(st, idx){
    var card=document.createElement('div');
    card.className='station'+(st.boss?' boss':'')+(idx===0?'':' hidden'); card.id='station-'+idx;
    card.innerHTML='<div class="station-kicker">'+st.kicker+'</div>'+
      '<div class="station-title">'+st.title+'</div>'+
      '<div class="station-lead">'+st.lead+'</div>'+
      (st.media?'<div class="station-media">'+st.media+'</div>':'')+
      '<div class="station-body" id="body-'+idx+'"></div>';
    stage.appendChild(card);
    buildBody(idx, st);
  });
  var fin=document.createElement('div'); fin.className='station hidden'; fin.id='station-finish';
  fin.innerHTML='<div class="finish" id="finishBody"></div>'; stage.appendChild(fin);
}
function buildBody(idx, st){
  if(st.type==='pdf')   buildPdf(idx, st);
  if(st.type==='info')  buildInfo(idx, st);
  if(st.type==='tf')    buildTF(idx, st);
  if(st.type==='label') (MODE==='challenge') ? buildLabelType(idx, st) : buildLabelChoose(idx, st);
  if(st.type==='gaps')  buildGaps(idx, st);
  if(st.type==='quiz')  buildQuiz(idx, st);
}

function buildPdf(idx, st){
  maxPts[idx]=0;
  document.getElementById('body-'+idx).innerHTML=
    '<iframe src="'+st.src+'" class="pdf-frame"></iframe>'+
    '<p style="font-size:0.78rem;color:var(--text-muted);margin:6px 0 14px;">'+
      'PDF wird nicht angezeigt? <a href="'+st.src+'" target="_blank">Folien herunterladen</a></p>'+
    '<div class="read-btn-row"><button class="btn btn-primary" id="pdfbtn-'+idx+'">Weiter →</button></div>';
  document.getElementById('pdfbtn-'+idx).addEventListener('click', function(){
    if(solved[idx]) return; solved[idx]=true; addXp(5); this.disabled=true; this.textContent='Angeschaut ✓'; updateNav();
  });
}

function buildInfo(idx, st){
  maxPts[idx]=0;
  document.getElementById('body-'+idx).innerHTML='<div class="read">'+st.read+'</div>'+
    '<div class="read-btn-row"><button class="btn btn-primary" id="readbtn-'+idx+'">Gelesen ✓ (+5 XP)</button></div>';
  document.getElementById('readbtn-'+idx).addEventListener('click', function(){ if(solved[idx]) return; solved[idx]=true; addXp(5); this.disabled=true; this.textContent='Gelesen ✓'; updateNav(); });
}

function buildTF(idx, st){
  maxPts[idx]=st.items.length;
  var body=document.getElementById('body-'+idx);
  st.items.forEach(function(it, ii){
    var item=document.createElement('div'); item.className='tf-item';
    item.innerHTML='<div class="tf-statement">'+it.s+'</div>'+
      '<div class="tf-btns"><button class="tf-btn" data-i="'+ii+'" data-v="true">Wahr</button>'+
      '<button class="tf-btn" data-i="'+ii+'" data-v="false">Falsch</button></div>'+
      '<div class="tf-exp" id="tfexp-'+idx+'-'+ii+'">'+it.e+'</div>';
    body.appendChild(item);
  });
  body.querySelectorAll('.tf-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var ii=+btn.dataset.i; var pick=btn.dataset.v==='true';
      if(body.querySelector('.tf-btn[data-i="'+ii+'"]:disabled')) return;
      var it=st.items[ii];
      body.querySelectorAll('.tf-btn[data-i="'+ii+'"]').forEach(function(b){ b.disabled=true; if((b.dataset.v==='true')===it.a) b.classList.add('reveal'); });
      if(pick===it.a){ btn.classList.add('sel-correct'); earned[idx]++; registerAnswer(true); } else { btn.classList.add('sel-wrong'); registerAnswer(false); }
      document.getElementById('tfexp-'+idx+'-'+ii).classList.add('show');
      var answered=0; for(var k=0;k<st.items.length;k++){ if(document.querySelector('#body-'+idx+' .tf-btn[data-i="'+k+'"]:disabled')) answered++; }
      if(answered===st.items.length) solved[idx]=true;
      updateNav();
    });
  });
}

/* Beschriften – Challenge: eintippen */
function buildLabelType(idx, st){
  maxPts[idx]=st.items.length;
  var html='<div class="slots-grid">';
  st.items.forEach(function(it){
    html+='<div class="slot-row"><div class="slot-num">'+it.n+'</div><div class="type-cell">'+
      '<input class="type-input" id="lb-'+idx+'-'+it.n+'" type="text" autocomplete="off" placeholder="Nr. '+it.n+' …">'+
      '<div class="type-sol" id="lbsol-'+idx+'-'+it.n+'" style="display:none;"></div></div></div>';
  });
  html+='</div><div class="check-btn-row"><button class="btn btn-primary" id="lbcheck-'+idx+'">Überprüfen</button></div>';
  document.getElementById('body-'+idx).innerHTML=html;
  st.items.forEach(function(it, i){
    document.getElementById('lb-'+idx+'-'+it.n).addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); var nx=st.items[i+1]; if(nx) document.getElementById('lb-'+idx+'-'+nx.n).focus(); }
    });
  });
  document.getElementById('lbcheck-'+idx).addEventListener('click', function(){
    if(solved[idx]) return; var correct=0;
    st.items.forEach(function(it){
      var inp=document.getElementById('lb-'+idx+'-'+it.n); var sol=document.getElementById('lbsol-'+idx+'-'+it.n);
      inp.classList.remove('correct','wrong');
      var ok=matchKeys(inp.value, it);
      if(ok){ inp.classList.add('correct'); sol.style.display='none'; correct++; } else { inp.classList.add('wrong'); sol.textContent='→ '+it.name; sol.style.display='block'; }
      registerAnswer(ok);
    });
    earned[idx]=correct; solved[idx]=true; this.disabled=true; updateNav();
  });
}

/* Beschriften – Lernpfad: zuordnen per Auswahl */
function buildLabelChoose(idx, st){
  maxPts[idx]=st.items.length;
  var names=st.items.map(function(it){return it.name;}).filter(function(v,i,a){return a.indexOf(v)===i;});
  var optHtml=shuffle(names).map(function(o){return '<option>'+o+'</option>';}).join('');
  var html='<div class="slots-grid">';
  st.items.forEach(function(it){
    html+='<div class="slot-row"><div class="slot-num">'+it.n+'</div><div class="type-cell">'+
      '<select class="lp-select" id="lb-'+idx+'-'+it.n+'"><option value="">…</option>'+optHtml+'</select>'+
      '<div class="type-sol" id="lbsol-'+idx+'-'+it.n+'" style="display:none;"></div></div></div>';
  });
  html+='</div><div class="check-btn-row"><button class="btn btn-primary" id="lbcheck-'+idx+'">Überprüfen</button></div>';
  document.getElementById('body-'+idx).innerHTML=html;
  document.getElementById('lbcheck-'+idx).addEventListener('click', function(){
    if(solved[idx]) return; var correct=0;
    st.items.forEach(function(it){
      var sel=document.getElementById('lb-'+idx+'-'+it.n); var sol=document.getElementById('lbsol-'+idx+'-'+it.n);
      sel.classList.remove('correct','wrong');
      var ok=(sel.value===it.name);
      if(ok){ sel.classList.add('correct'); sol.style.display='none'; correct++; } else { sel.classList.add('wrong'); sol.textContent='→ '+it.name; sol.style.display='block'; }
      sel.disabled=true; registerAnswer(ok);
    });
    earned[idx]=correct; solved[idx]=true; this.disabled=true; updateNav();
  });
}

function buildGaps(idx, st){
  var gapCount=0; var html='<div class="gap-text">';
  st.parts.forEach(function(part){
    if(typeof part==='string'){ html+=part; }
    else { var gi=gapCount++; var opts=shuffleIdx(part.opts.length);
      html+='<select data-g="'+gi+'" data-correct="'+part.correct+'"><option value="-1">…</option>';
      opts.forEach(function(oi){ html+='<option value="'+oi+'">'+part.opts[oi]+'</option>'; });
      html+='</select>';
    }
  });
  html+='</div><div class="check-btn-row"><button class="btn btn-primary" id="gapcheck-'+idx+'">Prüfen</button></div>';
  document.getElementById('body-'+idx).innerHTML=html;
  maxPts[idx]=gapCount;
  document.getElementById('gapcheck-'+idx).addEventListener('click', function(){
    if(solved[idx]) return;
    var sels=document.querySelectorAll('#body-'+idx+' select'); var ok=0;
    sels.forEach(function(sel){ sel.classList.remove('correct','wrong'); var good=(+sel.value===+sel.dataset.correct); if(good){sel.classList.add('correct'); ok++;} else sel.classList.add('wrong'); sel.disabled=true; registerAnswer(good); });
    earned[idx]=ok; solved[idx]=true; this.disabled=true; updateNav();
  });
}

function buildQuiz(idx, st){
  maxPts[idx]=st.questions.length;
  var body=document.getElementById('body-'+idx);
  st.questions.forEach(function(qq, qi){
    var block=document.createElement('div'); block.className='q-block';
    var h='<div class="q-text">'+(qi+1)+'. '+qq.q+'</div>';
    shuffleIdx(qq.opts.length).forEach(function(oi){ h+='<button class="opt" data-q="'+qi+'" data-o="'+oi+'">'+qq.opts[oi]+'</button>'; });
    block.innerHTML=h; body.appendChild(block);
  });
  body.querySelectorAll('.opt').forEach(function(btn){
    btn.addEventListener('click', function(){
      var qi=+btn.dataset.q, oi=+btn.dataset.o, qq=st.questions[qi];
      if(body.querySelector('.opt[data-q="'+qi+'"]:disabled')) return;
      body.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(b){ b.disabled=true; if(+b.dataset.o===qq.correct) b.classList.add('correct'); });
      if(oi!==qq.correct){ btn.classList.add('wrong'); registerAnswer(false); } else { earned[idx]++; registerAnswer(true); }
      var answered=0; for(var k=0;k<st.questions.length;k++){ if(document.querySelector('#body-'+idx+' .opt[data-q="'+k+'"]:disabled')) answered++; }
      if(answered===st.questions.length) solved[idx]=true;
      updateNav();
    });
  });
}

function renderProgress(){
  var dots=document.getElementById('lsDots'); dots.innerHTML='';
  for(var i=0;i<N;i++){ var d=document.createElement('div'); d.className='ls-dot'+(i===current?' active':'')+(solved[i]?' done':''); d.textContent=solved[i]?'✓':(i+1); dots.appendChild(d); }
  document.getElementById('lsMeta').textContent = (current<N) ? ('Posten '+(current+1)+' von '+N) : 'Auswertung';
}
function showCard(which){
  document.querySelectorAll('.station').forEach(function(c){ c.classList.add('hidden'); });
  document.getElementById(which==='finish'?'station-finish':'station-'+which).classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}
function updateNav(){
  var nextBtn=document.getElementById('nextBtn'), prevBtn=document.getElementById('prevBtn');
  prevBtn.style.visibility=(current===0)?'hidden':'visible';
  if(current<N){ nextBtn.disabled=!solved[current]; nextBtn.textContent=(current===N-1)?'Zur Auswertung →':'Weiter →'; }
  renderProgress(); renderHud();
}
function goNext(){ if(current<N){ if(!solved[current]) return; current++; if(current<N){ showCard(current); updateNav(); } else { showFinish(); } } }
function goPrev(){ if(current===0) return; if(current>=N) current=N-1; else current--; showCard(current); document.getElementById('nextBtn').style.visibility='visible'; document.getElementById('nextBtn').disabled=false; updateNav(); }

function showFinish(){
  var total=0, max=0; for(var i=0;i<N;i++){ total+=earned[i]; max+=maxPts[i]; }
  var pct=max>0?Math.round(total/max*100):0;
  var rank = pct>=90?'Wärme-Meister 🥇' : pct>=75?'Wärme-Profi' : pct>=50?'Wärme-Geselle' : 'Wärme-Lehrling';
  var badges=[
    { icon:'📖', name:'Aufmerksamer Leser', got: MODE!=='challenge' },
    { icon:'🔥', name:'Brenner-Profi', got: findIdx('b_label')>=0 && earned[findIdx('b_label')]===maxPts[findIdx('b_label')] },
    { icon:'♨️', name:'Kessel-Kenner', got: findIdx('d_label')>=0 && earned[findIdx('d_label')]===maxPts[findIdx('d_label')] },
    { icon:'🚿', name:'Warmwasser-Profi', got: findIdx('f_label')>=0 && earned[findIdx('f_label')]===maxPts[findIdx('f_label')] },
    { icon:'⚡', name:'Serie (Streak 8+)', got: bestStreak>=8 },
    { icon:'🥇', name:'Wärme-Meister (90%)', got: pct>=90 }
  ];
  var got=0, bh=''; badges.forEach(function(b){ if(b.got) got++; bh+='<span class="badge-chip'+(b.got?' earned':'')+'">'+(b.got?b.icon:'<span class="lock">🔒</span>')+' '+b.name+'</span>'; });
  document.getElementById('finishBody').innerHTML=
    '<div class="station-kicker">'+(MODE==='challenge'?'Prüfung beendet':'Geschafft')+'</div>'+
    '<div class="rank">'+rank+'</div>'+
    '<div class="big-score">'+xp+' XP</div>'+
    '<div class="score-sub">'+total+' / '+max+' Punkte ('+pct+' %) · längste Serie 🔥 '+bestStreak+' · '+got+'/'+badges.length+' Abzeichen</div>'+
    '<div class="badges">'+bh+'</div>'+
    '<button class="btn btn-primary" onclick="restart()">Nochmals starten</button>'+
    '<a class="back-link" href="../index.html" style="display:block;margin-top:14px;">← Alle Lerntools</a>';
  showCard('finish');
  document.getElementById('nextBtn').style.visibility='hidden';
  document.getElementById('prevBtn').style.visibility='visible';
  renderProgress();
}
function restart(){
  current=0; xp=0; streak=0; bestStreak=0;
  for(var i=0;i<N;i++){ solved[i]=false; earned[i]=0; }
  document.getElementById('nextBtn').style.visibility='visible';
  buildAll(); showCard(0); updateNav();
}

buildAll(); showCard(0); updateNav();
</script>
