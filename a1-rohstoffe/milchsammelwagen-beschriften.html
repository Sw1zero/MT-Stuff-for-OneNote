<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milchsammelwagen beschriften – a.1</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .back-link { display:inline-block; font-size:0.82rem; color:var(--text-muted); text-decoration:none; margin-bottom:1rem; }
    .back-link:hover { color:var(--red); }

    /* Schwierigkeits-Umschalter */
    .level-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.25rem; }
    .level-btn {
      font-family:var(--font); font-size:0.82rem; font-weight:600;
      padding:7px 16px; border-radius:20px; border:1.5px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer; transition:all 0.15s;
    }
    .level-btn:hover { border-color:var(--blue); color:var(--blue-dark); }
    .level-btn.active { background:var(--blue-dark); border-color:var(--blue-dark); color:#fff; }

    .instruction { font-size:0.84rem; color:var(--text-muted); margin-bottom:1rem; text-align:center; line-height:1.5; }

    /* Bild */
    .schema-wrap { background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:1rem; margin-bottom:1.25rem; }
    .img-stage { position:relative; width:100%; }
    .img-stage img { width:100%; display:block; border-radius:var(--radius-sm); }
    .img-credit { font-size:0.72rem; color:var(--text-subtle); margin-top:0.5rem; text-align:right; }

    /* Hotspot-Ebene (Mittel) */
    .hotspot-layer { position:absolute; inset:0; display:none; }
    .hotspot-layer.active { display:block; cursor:crosshair; }
    .hs-marker {
      position:absolute; transform:translate(-50%,-50%);
      width:26px; height:26px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.74rem; font-weight:700; color:#fff; background:#16a34a;
      box-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    .hs-miss { position:absolute; transform:translate(-50%,-50%); color:var(--red); font-weight:800; font-size:1.4rem; pointer-events:none; animation:hsmiss 0.6s ease forwards; }
    @keyframes hsmiss { 0%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-60%) scale(1.5);} }
    .hs-zone-dbg { position:absolute; transform:translate(-50%,-50%); border:2px dashed rgba(204,0,39,0.7); border-radius:50%; pointer-events:none; }
    .hs-zone-dbg span { position:absolute; top:-2px; left:50%; transform:translate(-50%,-100%); font-size:10px; color:#C40027; font-weight:700; }
    .dbg-readout { font-family:monospace; font-size:0.78rem; color:var(--blue-dark); background:var(--blue-tint); padding:6px 10px; border-radius:var(--radius-sm); margin-bottom:1rem; display:none; }
    .dbg-readout.active { display:block; }

    /* Hotspot-Prompt */
    .hs-prompt { background:var(--blue-tint); border-radius:var(--radius-md); padding:0.8rem 1rem; text-align:center; margin-bottom:1.25rem; font-size:0.9rem; color:var(--text); }
    .hs-prompt b { color:var(--blue-dark); font-size:1.08rem; }
    .hs-prompt .hs-progress { display:block; font-size:0.74rem; color:var(--text-subtle); margin-bottom:3px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; }

    /* Wortbank (Einfach) */
    .word-bank { display:flex; flex-wrap:wrap; gap:0.5rem; background:var(--blue-light); border-radius:var(--radius-md); padding:0.9rem 1rem; margin-bottom:1.25rem; min-height:56px; }
    .word-chip {
      font-family:var(--font); font-size:0.82rem; font-weight:500;
      background:var(--surface); border:2px solid var(--border); border-radius:20px;
      padding:0.32rem 0.85rem; cursor:grab; color:var(--text); line-height:1.4;
      user-select:none; touch-action:none; transition:border-color 0.15s, opacity 0.15s;
    }
    .word-chip:hover { border-color:var(--blue); }
    .word-chip.used { opacity:0.2; pointer-events:none; }
    .word-chip.selected { background:var(--blue); border-color:var(--blue); color:#fff; }

    /* Slots (Einfach) + Eingaben (Schwer) */
    .slots-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.55rem; margin-bottom:1.25rem; }
    @media (max-width:520px){ .slots-grid { grid-template-columns:1fr; } }
    .slot-row { display:flex; align-items:center; gap:0.5rem; }
    .slot-num {
      width:30px; height:30px; flex-shrink:0; border-radius:50%;
      background:var(--blue-dark); color:#fff; font-size:0.78rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
    }
    .slot-box {
      flex:1; min-height:38px; border:2px dashed var(--border); border-radius:var(--radius-sm);
      padding:0.3rem 0.65rem; font-size:0.82rem; font-family:var(--font); color:var(--text-subtle);
      display:flex; align-items:center; transition:all 0.15s; background:var(--surface);
    }
    .slot-box.ready { border-color:var(--blue); border-style:solid; background:#f0f7ff; }
    .slot-box.over { border-color:var(--blue); border-style:solid; background:#e8f4ff; }
    .slot-box.filled { border-style:solid; border-color:var(--blue); color:var(--text); font-weight:500; cursor:grab; touch-action:none; user-select:none; }
    .slot-box.correct { border-color:#16a34a !important; background:#f0fdf4 !important; color:#15803d !important; cursor:default; }
    .slot-box.wrong { border-color:var(--red) !important; background:var(--red-light) !important; color:var(--red) !important; cursor:default; }

    .type-input {
      flex:1; min-width:0; font-family:var(--font); font-size:0.85rem;
      padding:0.5rem 0.7rem; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      background:#f8fafc; color:var(--text); transition:border-color 0.15s;
    }
    .type-input:focus { outline:none; border-color:var(--blue); background:#fff; }
    .type-input.correct { border-color:#16a34a; background:#f0fdf4; }
    .type-input.wrong   { border-color:var(--red); background:var(--red-light); }
    .type-sol { font-size:0.72rem; color:#15803d; margin-top:2px; }
    .type-cell { flex:1; }

    #touchClone {
      position:fixed; pointer-events:none; z-index:9999; opacity:0.88; transform:scale(1.06);
      border-radius:20px; padding:0.32rem 0.85rem; background:var(--blue); color:#fff;
      font-family:var(--font); font-size:0.82rem; font-weight:500;
      box-shadow:0 4px 16px rgba(0,102,204,0.35); white-space:nowrap; display:none;
    }

    .btn-row { display:flex; gap:0.75rem; flex-wrap:wrap; }
    .result-banner { margin-top:1.25rem; padding:0.9rem 1rem; border-radius:var(--radius-md); font-weight:600; font-size:0.92rem; text-align:center; display:none; }
    .result-banner.show { display:block; }
    .result-banner.perfect { background:#f0fdf4; color:#15803d; border:1.5px solid #bbf7d0; }
    .result-banner.partial { background:#fff7ed; color:#c2410c; border:1.5px solid #fed7aa; }
  </style>
</head>
<body>

<header class="bzwu-header">
  <div class="header-text">
  <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologie EFZ · a.1</span>
  <h1>Milchsammelwagen beschriften</h1>
  <p>Die Annahmeteile des Milchsammelwagens kennen</p>
  </div>
  <div class="header-logos">
    <img src="../assets/logos/bzwu.png" alt="BZWU" class="header-logo">
    <img src="../assets/logos/milchtechnologen.svg" alt="Milchtechnologen" class="header-logo">
  </div>
</header>

<main class="page-main">
  <a class="back-link" href="../index.html">← Alle Lerntools</a>

  <div class="level-bar">
    <button class="level-btn active" id="lvl-einfach" onclick="setLevel('einfach')">Einfach – zuordnen</button>
    <button class="level-btn"        id="lvl-mittel"  onclick="setLevel('mittel')">Mittel – anklicken</button>
    <button class="level-btn"        id="lvl-schwer"  onclick="setLevel('schwer')">Schwer – eintippen</button>
  </div>

  <p class="instruction" id="instruction"></p>

  <div class="dbg-readout" id="dbgReadout"></div>

  <div class="schema-wrap">
    <div class="img-stage" id="imgStage">
      <img id="schemaImg" src="images/milchsammelwagen/a.1_Milchsammelwagen_Nummern.png" alt="Milchsammelwagen mit nummerierten Annahmeteilen">
      <div class="hotspot-layer" id="hotspotLayer"></div>
    </div>
    <div class="img-credit">Bildquelle: Lehrmittel a.1 – Rohstoffe annehmen</div>
  </div>

  <div id="modeBody"></div>

  <div class="btn-row" id="btnRow">
    <button type="button" class="btn btn-primary" id="checkBtn" onclick="checkLevel()">Überprüfen</button>
    <button type="button" class="btn btn-ghost" onclick="resetLevel()">Zurücksetzen</button>
  </div>

  <div class="result-banner" id="resultBanner"></div>

</main>

<div id="touchClone"></div>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologie EFZ · Philipp Neukomm
</footer>

<script>
/* ============================================================
   Milchsammelwagen beschriften (a.1) – 3 Schwierigkeitsstufen
   Bauteile + Hotspot-Zonen (cx/cy/r in % des Bildes).
   Zonen mit ?debug kalibrieren (Klick zeigt Koordinaten).
   ============================================================ */
var NUM_IMG   = 'images/milchsammelwagen/a.1_Milchsammelwagen_Nummern.png';
var BLANK_IMG = 'images/milchsammelwagen/a.1_Milchsammelwagen_ohne_Nummern.png';
var ASPECT    = 865 / 937;   // Bildhöhe/-breite für kreisrunde Trefferzonen

var PARTS = [
  { n:1, name:'Milchannahmeschlauch', cx:62, cy:42, r:8,
    keys:['annahmeschlauch','milchannahmeschlauch','annahme schlauch','saugschlauch','annahmeschlauch'] },
  { n:2, name:'Filter', cx:47, cy:34, r:6,
    keys:['filter','sieb'] },
  { n:3, name:'Pumpe', cx:41, cy:42, r:6,
    keys:['pumpe','annahmepumpe','milchpumpe'] },
  { n:4, name:'Luftabscheider', cx:29, cy:46, r:8,
    keys:['luftabscheider','luft abscheider','entluefter','entlueftung'] },
  { n:5, name:'Durchflussmessgerät', cx:35, cy:54, r:8,
    keys:['durchflussmessgeraet','durchflussmesser','durchflussmessgerät','durchlaufzaehler','milchzaehler','zaehler','messgeraet'] },
  { n:6, name:'Rückschlagventil', cx:45, cy:62, r:6,
    keys:['rueckschlagventil','rückschlagventil','rueckschlag','rückschlag'] },
  { n:7, name:'Ventilgruppe', cx:53, cy:60, r:6,
    keys:['ventilgruppe','ventil gruppe','ventile','ventilblock'] },
  { n:8, name:'Milchabladestutzen', cx:61, cy:64, r:7,
    keys:['milchabladestutzen','abladestutzen','stutzen','abladestützen'] },
  { n:9, name:'Milchabladeschlauch', cx:81, cy:42, r:9,
    keys:['milchabladeschlauch','abladeschlauch','ablade schlauch'] }
];

var DEBUG = /[?&]debug/.test(location.search);
var level = 'einfach';

/* ---- Hilfen ---- */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function fold(s) {
  return String(s).toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function matchPart(input, part) {
  var f = fold(input);
  if (!f) return false;
  if (f === fold(part.name)) return true;
  for (var i = 0; i < part.keys.length; i++) {
    if (f.indexOf(fold(part.keys[i])) !== -1) return true;
  }
  return false;
}

/* ---- Umschalter ---- */
function setLevel(l) {
  level = l;
  ['einfach','mittel','schwer'].forEach(function(k) {
    document.getElementById('lvl-' + k).classList.toggle('active', k === l);
  });
  document.getElementById('schemaImg').src = (l === 'mittel') ? BLANK_IMG : NUM_IMG;
  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('dbgReadout').classList.toggle('active', DEBUG && l === 'mittel');
  resetLevel();
}

function resetLevel() {
  var hl = document.getElementById('hotspotLayer');
  hl.innerHTML = ''; hl.classList.remove('active'); hl.onclick = null;
  document.getElementById('resultBanner').className = 'result-banner';
  var body = document.getElementById('modeBody');
  body.innerHTML = '';
  var checkBtn = document.getElementById('checkBtn');
  var instr = document.getElementById('instruction');

  if (level === 'einfach') {
    checkBtn.style.display = '';
    instr.textContent = 'Ziehen Sie die Begriffe auf die richtige Nummer – oder tippen Sie einen Begriff und dann das Feld an. Bereits platzierte Begriffe lassen sich zurückziehen.';
    buildEinfach(body);
  } else if (level === 'schwer') {
    checkBtn.style.display = '';
    instr.textContent = 'Schreiben Sie zu jeder Nummer den Namen des Bauteils selbst auf. Kleine Tippfehler werden akzeptiert.';
    buildSchwer(body);
  } else {
    checkBtn.style.display = 'none';
    instr.textContent = 'Klicken Sie das gesuchte Bauteil direkt auf dem Bild an.';
    buildMittel(body);
  }
}

/* ============================================================
   EINFACH – Begriffe zuordnen (Klick / Drag & Drop / Touch)
   ============================================================ */
var dragWord = null, dragSource = null, selectedWord = null;
var touchWord = null, touchSource = null;
var touchCloneEl = document.getElementById('touchClone');
var touchOffX = 0, touchOffY = 0;

function buildEinfach(body) {
  body.innerHTML = '<div class="word-bank" id="wordBank"></div><div class="slots-grid" id="slotsGrid"></div>';
  dragWord = dragSource = selectedWord = touchWord = touchSource = null;

  var bank = document.getElementById('wordBank');
  shuffle(PARTS.map(function(p){ return p.name; })).forEach(function(word) {
    var chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.textContent = word;
    chip.dataset.word = word;
    chip.setAttribute('draggable', 'true');
    chip.addEventListener('dragstart', function(e) { dragWord = word; dragSource = chip; e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('touchstart', function(e) { onTouchStart(e, chip, word, false); }, {passive:false});
    chip.addEventListener('click', function() { selectChip(chip, word); });
    bank.appendChild(chip);
  });

  var grid = document.getElementById('slotsGrid');
  PARTS.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'slot-row';
    var badge = document.createElement('div');
    badge.className = 'slot-num'; badge.textContent = p.n;
    var box = document.createElement('div');
    box.className = 'slot-box'; box.dataset.slot = p.n; box.textContent = '—';
    box.addEventListener('dragover', function(e) { e.preventDefault(); if (!box.classList.contains('correct') && !box.classList.contains('wrong')) box.classList.add('over'); });
    box.addEventListener('dragleave', function() { box.classList.remove('over'); });
    box.addEventListener('drop', function(e) { e.preventDefault(); box.classList.remove('over'); dropOnSlot(box); });
    box.addEventListener('dragstart', function(e) { if (!box.dataset.filled) { e.preventDefault(); return; } dragWord = box.dataset.filled; dragSource = box; e.dataTransfer.effectAllowed = 'move'; });
    box.addEventListener('touchstart', function(e) { if (!box.dataset.filled) return; onTouchStart(e, box, box.dataset.filled, true); }, {passive:false});
    box.addEventListener('click', function() { clickBox(box); });
    row.appendChild(badge); row.appendChild(box); grid.appendChild(row);
  });
}

function selectChip(chip, word) {
  if (chip.classList.contains('selected')) { chip.classList.remove('selected'); selectedWord = null; clearReady(); return; }
  document.querySelectorAll('.word-chip.selected').forEach(function(c){ c.classList.remove('selected'); });
  chip.classList.add('selected'); selectedWord = word;
  document.querySelectorAll('.slot-box').forEach(function(b){
    b.classList.remove('ready');
    if (!b.dataset.filled && !b.classList.contains('correct') && !b.classList.contains('wrong')) b.classList.add('ready');
  });
}
function clickBox(box) {
  if (box.classList.contains('correct') || box.classList.contains('wrong')) return;
  if (box.dataset.filled) { returnWord(box.dataset.filled); clearSlot(box); if (selectedWord) box.classList.add('ready'); return; }
  if (!selectedWord) return;
  fillSlot(box, selectedWord); markUsed(selectedWord); selectedWord = null;
  document.querySelectorAll('.word-chip.selected').forEach(function(c){ c.classList.remove('selected'); });
  clearReady();
}
function clearReady() { document.querySelectorAll('.slot-box').forEach(function(b){ b.classList.remove('ready'); }); }

function dropOnSlot(box) {
  if (!dragWord) return;
  if (box.classList.contains('correct') || box.classList.contains('wrong')) return;
  var displaced = box.dataset.filled || null;
  if (dragSource && dragSource.classList.contains('slot-box')) {
    clearSlot(dragSource);
    if (displaced) fillSlot(dragSource, displaced);
  } else if (dragSource) {
    markUsed(dragWord);
    if (displaced) returnWord(displaced);
  }
  fillSlot(box, dragWord);
  dragWord = dragSource = null;
}
function fillSlot(box, word) { box.dataset.filled = word; box.textContent = word; box.className = 'slot-box filled'; box.setAttribute('draggable','true'); }
function clearSlot(box) { delete box.dataset.filled; box.textContent = '—'; box.className = 'slot-box'; box.setAttribute('draggable','false'); }
function markUsed(word) { document.querySelectorAll('.word-chip').forEach(function(c){ if (c.dataset.word === word) c.classList.add('used'); }); }
function returnWord(word) { document.querySelectorAll('.word-chip').forEach(function(c){ if (c.dataset.word === word) c.classList.remove('used'); }); }

function onTouchStart(e, el, word, isSlot) {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  var t = e.touches[0], rect = el.getBoundingClientRect();
  touchWord = word; touchSource = {el:el, isSlot:isSlot};
  touchOffX = t.clientX - rect.left; touchOffY = t.clientY - rect.top;
  touchCloneEl.textContent = word;
  touchCloneEl.style.left = (t.clientX - touchOffX) + 'px';
  touchCloneEl.style.top  = (t.clientY - touchOffY) + 'px';
  touchCloneEl.style.display = 'block';
  el.style.opacity = '0.25';
}
document.addEventListener('touchmove', function(e) {
  if (!touchWord) return;
  e.preventDefault();
  var t = e.touches[0];
  touchCloneEl.style.left = (t.clientX - touchOffX) + 'px';
  touchCloneEl.style.top  = (t.clientY - touchOffY) + 'px';
}, {passive:false});
document.addEventListener('touchend', function(e) {
  if (!touchWord) return;
  var t = e.changedTouches[0];
  touchCloneEl.style.display = 'none';
  touchSource.el.style.opacity = '';
  var under = document.elementFromPoint(t.clientX, t.clientY);
  var box = under ? under.closest('.slot-box') : null;
  if (box && !box.classList.contains('correct') && !box.classList.contains('wrong')) {
    var displaced = box.dataset.filled || null;
    if (touchSource.isSlot) { clearSlot(touchSource.el); if (displaced) fillSlot(touchSource.el, displaced); }
    else { markUsed(touchWord); if (displaced) returnWord(displaced); }
    fillSlot(box, touchWord);
  }
  touchWord = touchSource = null;
});

function checkEinfach() {
  var correct = 0, filled = 0;
  document.querySelectorAll('.slot-box').forEach(function(box) {
    var val = box.dataset.filled; if (!val) return;
    filled++;
    var idx = parseInt(box.dataset.slot) - 1;
    box.classList.remove('filled');
    if (val === PARTS[idx].name) { box.classList.add('correct'); correct++; }
    else box.classList.add('wrong');
  });
  showResult(correct, filled);
}

/* ============================================================
   SCHWER – Namen selbst eintippen
   ============================================================ */
function buildSchwer(body) {
  var grid = document.createElement('div');
  grid.className = 'slots-grid';
  PARTS.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML =
      '<div class="slot-num">' + p.n + '</div>' +
      '<div class="type-cell">' +
        '<input class="type-input" id="ti-' + p.n + '" type="text" autocomplete="off" placeholder="Bauteil ' + p.n + ' …">' +
        '<div class="type-sol" id="sol-' + p.n + '" style="display:none;"></div>' +
      '</div>';
    grid.appendChild(row);
  });
  body.appendChild(grid);
  PARTS.forEach(function(p) {
    var inp = document.getElementById('ti-' + p.n);
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); var nx = document.getElementById('ti-' + (p.n + 1)); if (nx) nx.focus(); else checkLevel(); }
    });
  });
}
function checkSchwer() {
  var correct = 0;
  PARTS.forEach(function(p) {
    var inp = document.getElementById('ti-' + p.n);
    var sol = document.getElementById('sol-' + p.n);
    inp.classList.remove('correct','wrong');
    if (matchPart(inp.value, p)) { inp.classList.add('correct'); sol.style.display = 'none'; correct++; }
    else { inp.classList.add('wrong'); sol.textContent = '→ ' + p.name; sol.style.display = 'block'; }
  });
  showResult(correct, PARTS.length);
}

/* ============================================================
   MITTEL – Hotspot (Bauteil anklicken)
   ============================================================ */
var hsOrder = [], hsIndex = 0, hsMiss = 0;

function buildMittel(body) {
  hsOrder = shuffle(PARTS.slice());
  hsIndex = 0; hsMiss = 0;
  body.innerHTML = '<div class="hs-prompt" id="hsPrompt"></div>';
  var hl = document.getElementById('hotspotLayer');
  hl.classList.add('active');
  hl.onclick = onHotspotClick;
  if (DEBUG) drawDebugZones();
  renderPrompt();
}

function renderPrompt() {
  var prompt = document.getElementById('hsPrompt');
  if (!prompt) return;
  if (hsIndex >= hsOrder.length) {
    var total = hsOrder.length;
    prompt.innerHTML = '<span class="hs-progress">Fertig</span> Alle ' + total + ' Bauteile gefunden!';
    showResult(total, total, hsMiss);
    return;
  }
  prompt.innerHTML = '<span class="hs-progress">Bauteil ' + (hsIndex + 1) + ' von ' + hsOrder.length + '</span>' +
    'Klicken Sie auf: <b>' + hsOrder[hsIndex].name + '</b>';
}

function onHotspotClick(e) {
  var hl = document.getElementById('hotspotLayer');
  var rect = hl.getBoundingClientRect();
  var px = (e.clientX - rect.left) / rect.width * 100;
  var py = (e.clientY - rect.top)  / rect.height * 100;

  if (DEBUG) {
    document.getElementById('dbgReadout').textContent = 'Klick: cx:' + px.toFixed(1) + ', cy:' + py.toFixed(1);
  }
  if (hsIndex >= hsOrder.length) return;

  var target = hsOrder[hsIndex];
  var dx = px - target.cx;
  var dy = (py - target.cy) * ASPECT;
  var dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= target.r) {
    var m = document.createElement('div');
    m.className = 'hs-marker';
    m.style.left = target.cx + '%';
    m.style.top  = target.cy + '%';
    m.textContent = target.n;
    m.title = target.name;
    hl.appendChild(m);
    hsIndex++;
    renderPrompt();
  } else {
    hsMiss++;
    var miss = document.createElement('div');
    miss.className = 'hs-miss';
    miss.style.left = px + '%';
    miss.style.top  = py + '%';
    miss.textContent = '✗';
    hl.appendChild(miss);
    setTimeout(function() { if (miss.parentNode) miss.parentNode.removeChild(miss); }, 600);
  }
}

function drawDebugZones() {
  var hl = document.getElementById('hotspotLayer');
  var w = hl.getBoundingClientRect().width || 460;
  PARTS.forEach(function(p) {
    var d = document.createElement('div');
    d.className = 'hs-zone-dbg';
    d.style.left = p.cx + '%';
    d.style.top  = p.cy + '%';
    var px = p.r / 100 * w * 2;
    d.style.width = px + 'px';
    d.style.height = px + 'px';
    d.innerHTML = '<span>' + p.n + '</span>';
    hl.appendChild(d);
  });
}

/* ---- gemeinsame Auswertung ---- */
function checkLevel() {
  if (level === 'einfach') checkEinfach();
  else if (level === 'schwer') checkSchwer();
}

function showResult(correct, total, misses) {
  var banner = document.getElementById('resultBanner');
  if (correct === total && (misses === undefined || true)) {
    if (correct === total) {
      var extra = (misses !== undefined && misses > 0) ? ' (' + misses + ' Fehlklick' + (misses === 1 ? '' : 's') + ')' : '';
      banner.textContent = 'Perfekt! Alle ' + total + ' Annahmeteile richtig' + extra + '.';
      banner.className = 'result-banner show perfect';
      return;
    }
  }
  banner.textContent = correct + ' von ' + total + ' richtig. Schauen Sie sich die markierten nochmals an.';
  banner.className = 'result-banner show partial';
}

/* Init */
setLevel('einfach');
</script>
