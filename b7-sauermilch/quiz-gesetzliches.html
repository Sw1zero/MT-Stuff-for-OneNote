<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz b.7 – Gesetzliche Anforderungen</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .back-link {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 20px;
    }
    .back-link:hover { color: var(--red); }

    .quiz-center { display: flex; flex-direction: column; align-items: center; }

    .progress-text  { margin-bottom: 10px; }
    .progress-bar-wrap { width: 480px; max-width: 92vw; margin-bottom: 28px; }

    .quiz-card {
      width: 480px;
      max-width: 92vw;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 32px 32px 28px;
      margin-bottom: 16px;
    }

    .question-badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--red);
      margin-bottom: 12px;
      display: block;
    }

    .question-text {
      font-size: 1.02rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 24px;
    }

    .answers { display: flex; flex-direction: column; gap: 10px; }

    .answer-btn {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: left;
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.4;
      color: var(--text);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .answer-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-light); }
    .answer-btn:active:not(:disabled) { transform: scale(0.99); }

    .answer-btn .letter {
      font-weight: 700;
      font-size: 0.78rem;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 2px 7px;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s, color 0.15s;
    }

    .answer-btn.correct { border-color: #38a169; background: #f0fff4; }
    .answer-btn.correct .letter { background: #38a169; color: #fff; }
    .answer-btn.wrong { border-color: var(--red); background: var(--red-light); }
    .answer-btn.wrong .letter { background: var(--red); color: #fff; }
    .answer-btn.reveal { border-color: #38a169; background: #f0fff4; opacity: 0.8; }
    .answer-btn.reveal .letter { background: #38a169; color: #fff; }
    .answer-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      line-height: 1.5;
      display: none;
    }
    .feedback.correct { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; display: block; }
    .feedback.wrong { background: var(--red-light); border: 1px solid #fca5a5; color: var(--red-dark); display: block; }
    .feedback-icon { font-size: 1rem; margin-right: 6px; }

    .next-wrap { width: 480px; max-width: 92vw; display: flex; justify-content: flex-end; }

    .end-screen {
      width: 480px;
      max-width: 92vw;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      text-align: center;
      display: none;
    }
    .score-circle {
      width: 100px; height: 100px; border-radius: 50%;
      border: 5px solid var(--red);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .score-number { font-size: 2rem; font-weight: 700; color: var(--red); line-height: 1; }
    .score-total { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .end-message { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .end-sub { font-size: 0.86rem; color: var(--text-muted); margin-bottom: 28px; }
    .end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<header class="bzwu-header">
  <div class="header-text">
    <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · b.7</span>
    <h1>Gesetzliche Anforderungen</h1>
    <p>VLtH: Definitionen, Fettgehaltsstufen & Keimzahlen</p>
  </div>
  <div class="header-logos">
    <img src="../assets/logos/bzwu.png" alt="BZWU" class="header-logo">
    <img src="../assets/logos/milchtechnologen.svg" alt="Milchtechnologen" class="header-logo">
  </div>
</header>

<main class="page-main">
  <a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

  <div class="quiz-center">
    <div class="progress-text" id="progressText"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="quiz-card" id="quizCard">
      <span class="question-badge" id="questionBadge"></span>
      <div class="question-text" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="next-wrap" id="nextWrap" style="display:none">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Weiter &#8594;</button>
    </div>

    <div class="end-screen" id="endScreen">
      <div class="score-circle">
        <div class="score-number" id="scoreNumber"></div>
        <div class="score-total" id="scoreTotal"></div>
      </div>
      <div class="end-message" id="endMessage"></div>
      <div class="end-sub" id="endSub"></div>
      <div class="end-actions">
        <button class="btn btn-ghost" onclick="location.href='../index.html'">&#8592; Alle Lerntools</button>
        <button class="btn btn-primary" onclick="restartQuiz()">Nochmals versuchen</button>
      </div>
    </div>
  </div>
</main>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · Philipp Neukomm
</footer>

<script>
  const QUESTIONS = [
    {
      badge: "Definition",
      question: "Welche Milch muss laut VLtH für die Herstellung von «Joghurt» verwendet werden?",
      answers: ["Beliebige Säugetiermilch", "Kuhmilch", "Schafmilch", "Ziegenmilch"],
      correct: 1,
      explanation: "Die VLtH schreibt für Joghurt ausdrücklich Kuhmilch vor. Produkte aus Schaf-, Ziegen- oder Büffelmilch müssen anders bezeichnet werden."
    },
    {
      badge: "Definition",
      question: "Welche zwei Bakterienarten verlangt die VLtH im Joghurt?",
      answers: [
        "Streptococcus thermophilus und Lactobacillus delbrueckii ssp. bulgaricus",
        "Lactococcus lactis und Leuconostoc mesenteroides",
        "Streptococcus thermophilus und Candida kefir",
        "Bifidobakterien und Lactobacillus acidophilus"
      ],
      correct: 0,
      explanation: "Joghurt muss Sc. thermophilus und Lb. delbrueckii ssp. bulgaricus enthalten. Lb. bulgaricus darf durch andere, gesundheitlich unbedenkliche Laktobazillen ersetzt werden."
    },
    {
      badge: "Recht & Keimzahl",
      question: "Wie viele koloniebildende Einheiten der Joghurtbakterien müssen pro Gramm Endprodukt mindestens enthalten sein?",
      answers: ["100 000", "1 Million", "10 Millionen", "100 Millionen"],
      correct: 2,
      explanation: "Pro Gramm Joghurt müssen mindestens 10 Millionen (10 Mio) koloniebildende Einheiten der Joghurtbakterien enthalten sein."
    },
    {
      badge: "Recht & Keimzahl",
      question: "Warum darf Joghurt vor dem Abfüllen rechtlich nicht pasteurisiert werden?",
      answers: [
        "Weil sonst die Molkenproteine zerstört werden",
        "Weil im Endprodukt mindestens 10 Mio lebende Joghurtbakterien pro Gramm enthalten sein müssen",
        "Weil der pH-Wert dadurch zu stark ansteigt",
        "Weil die Früchte sonst verderben"
      ],
      correct: 1,
      explanation: "Pasteurisieren würde die Joghurtbakterien abtöten. Da gesetzlich mind. 10 Mio lebende KBE/g gefordert sind, ist ein Pasteurisieren vor dem Abfüllen nicht erlaubt (technologisch wäre es machbar)."
    },
    {
      badge: "Fettgehaltsstufe",
      question: "Welchen maximalen Milchfettgehalt darf «Magerjoghurt» (entrahmtes Joghurt) aufweisen?",
      answers: ["max. 5 g/kg", "max. 15 g/kg", "max. 35 g/kg", "max. 1 g/kg"],
      correct: 0,
      explanation: "Magerjoghurt / entrahmtes Joghurt: maximal 5 g Milchfett pro kg."
    },
    {
      badge: "Fettgehaltsstufe",
      question: "In welchem Bereich liegt der Milchfettgehalt von «teilentrahmtem Joghurt»?",
      answers: [
        "weniger als 5 g/kg",
        "mehr als 5 g/kg, jedoch weniger als 35 g/kg",
        "35 bis 50 g/kg",
        "mehr als 50 g/kg"
      ],
      correct: 1,
      explanation: "Teilentrahmtes Joghurt: mehr als 5 g/kg, aber weniger als 35 g/kg Milchfett."
    },
    {
      badge: "Fettgehaltsstufe",
      question: "Ab welchem Milchfettgehalt darf ein Joghurt als «Joghurt» bzw. «Vollmilchjoghurt» bezeichnet werden?",
      answers: ["mind. 25 g/kg", "mind. 35 g/kg", "mind. 50 g/kg", "mind. 15 g/kg"],
      correct: 1,
      explanation: "Joghurt / Vollmilchjoghurt: mindestens 35 g/kg Milchfett."
    },
    {
      badge: "Fettgehaltsstufe",
      question: "Welchen Milchfettgehalt fordert die VLtH für «rahmangereichertes Joghurt»?",
      answers: ["mind. 35 g/kg", "mind. 45 g/kg", "mind. 50 g/kg", "mind. 70 g/kg"],
      correct: 2,
      explanation: "Rahmangereichertes Joghurt: mindestens 50 g/kg Milchfett."
    },
    {
      badge: "Recht & Praxis",
      question: "Worauf bezieht sich der in der VLtH verlangte Fettgehalt eines Joghurts?",
      answers: [
        "Auf das fertige Endprodukt inkl. Zucker und Frucht",
        "Auf den Milchanteil im Joghurt",
        "Auf die gesamte Trockenmasse",
        "Auf den Rahmanteil"
      ],
      correct: 1,
      explanation: "Der Fettgehalt bezieht sich auf den Milchanteil, nicht aufs Endprodukt. Dadurch kann aus dem gleichen Nature-Joghurt durch Zugabe von Zucker/Frucht eine ganze Sortenpalette mit derselben Fettgehaltsstufe hergestellt werden."
    },
    {
      badge: "Sauermilch",
      question: "Welche Mikroorganismen schreibt die VLtH für «Sauermilch» vor?",
      answers: [
        "Dieselben wie für Joghurt",
        "Keine bestimmten, sie müssen nur «geeignet» sein",
        "Ausschliesslich Hefen",
        "Nur Bifidobakterien"
      ],
      correct: 1,
      explanation: "Für Sauermilch sind keine bestimmten Mikroorganismen vorgeschrieben. Die einzige Anforderung ist, dass die eingesetzten Mikroorganismen «geeignet» sind."
    },
    {
      badge: "Kefir",
      question: "Wie viele Mikroorganismen muss Kefir gemäss VLtH pro Gramm mindestens enthalten?",
      answers: [
        "1 Mio Milchsäurebakterien und 10 000 Hefen",
        "10 Mio Milchsäurebakterien",
        "1 Mio Hefen",
        "Nur Milchsäurebakterien, keine Hefen"
      ],
      correct: 0,
      explanation: "Kefir muss mind. 1 Million koloniebildende Einheiten Milchsäurebakterien und 10 000 lebensfähige Hefen pro Gramm enthalten."
    },
  ];

  let currentIndex = 0;
  let score = 0;
  let answered = false;
  let order = [];

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startQuiz() {
    order = shuffle([...Array(QUESTIONS.length).keys()]);
    currentIndex = 0;
    score = 0;
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("quizCard").style.display = "block";
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = QUESTIONS[order[currentIndex]];
    const total = QUESTIONS.length;

    document.getElementById("progressText").textContent = `Frage ${currentIndex + 1} von ${total}`;
    document.getElementById("progressBar").style.width = `${((currentIndex + 1) / total) * 100}%`;

    document.getElementById("questionBadge").textContent = q.badge;
    document.getElementById("questionText").textContent = q.question;

    const letters = ["A", "B", "C", "D"];
    const container = document.getElementById("answersContainer");
    container.innerHTML = q.answers.map((a, i) => `
      <button class="answer-btn" onclick="selectAnswer(${i})" id="ans-${i}">
        <span class="letter">${letters[i]}</span>
        <span>${a}</span>
      </button>
    `).join("");

    const fb = document.getElementById("feedback");
    fb.className = "feedback";
    fb.textContent = "";

    document.getElementById("nextWrap").style.display = "none";
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.textContent = currentIndex < QUESTIONS.length - 1 ? "Weiter →" : "Ergebnis anzeigen";
  }

  function selectAnswer(chosen) {
    if (answered) return;
    answered = true;

    const q = QUESTIONS[order[currentIndex]];
    const correct = q.correct;
    const isCorrect = chosen === correct;
    if (isCorrect) score++;

    for (let i = 0; i < q.answers.length; i++) {
      const btn = document.getElementById(`ans-${i}`);
      btn.disabled = true;
      if (i === correct && i === chosen) btn.classList.add("correct");
      else if (i === chosen && !isCorrect) btn.classList.add("wrong");
      else if (i === correct) btn.classList.add("reveal");
    }

    const fb = document.getElementById("feedback");
    if (isCorrect) {
      fb.className = "feedback correct";
      fb.innerHTML = `<span class="feedback-icon">&#10003;</span><strong>Richtig!</strong> ${q.explanation}`;
    } else {
      fb.className = "feedback wrong";
      fb.innerHTML = `<span class="feedback-icon">&#10007;</span><strong>Nicht ganz.</strong> ${q.explanation}`;
    }

    document.getElementById("nextWrap").style.display = "flex";
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= QUESTIONS.length) {
      showEndScreen();
    } else {
      showQuestion();
    }
  }

  function showEndScreen() {
    document.getElementById("quizCard").style.display = "none";
    document.getElementById("nextWrap").style.display = "none";
    document.getElementById("progressText").textContent = "";
    document.getElementById("progressBar").style.width = "100%";

    const total = QUESTIONS.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById("scoreNumber").textContent = score;
    document.getElementById("scoreTotal").textContent = `von ${total}`;

    let msg, sub;
    if (pct === 100) {
      msg = "Ausgezeichnet!";
      sub = "Alle Fragen richtig. Sie kennen die gesetzlichen Anforderungen bestens.";
    } else if (pct >= 75) {
      msg = "Sehr gut!";
      sub = "Fast alle Fragen richtig. Wiederholen Sie die markierten Themen kurz.";
    } else if (pct >= 50) {
      msg = "Gut gemacht.";
      sub = "Mehr als die Hälfte richtig. Schauen Sie die falschen Antworten nochmals an.";
    } else {
      msg = "Weiter üben.";
      sub = "Wiederholen Sie die VLtH-Anforderungen und versuchen Sie es danach nochmals.";
    }

    document.getElementById("endMessage").textContent = msg;
    document.getElementById("endSub").textContent = sub;
    document.getElementById("endScreen").style.display = "block";
  }

  function restartQuiz() { startQuiz(); }

  startQuiz();
</script>
</body>
</html>
