<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation – Säuregerinnung</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .back-link {
      display:inline-flex; align-items:center; gap:4px;
      font-size:.82rem; color:var(--text-muted); text-decoration:none;
      margin-bottom:18px;
    }
    .back-link:hover { color:var(--red); }

    .anim-wrap { width:600px; max-width:100%; margin:0 auto; display:flex; flex-direction:column; gap:16px; }

    .step-dots { display:flex; justify-content:center; gap:12px; margin-bottom:4px; }
    .step-dot  { width:11px; height:11px; border-radius:50%; background:var(--border); cursor:pointer; transition:background .2s,transform .15s; }
    .step-dot.active { background:var(--blue-dark); transform:scale(1.25); }
    .step-dot:hover  { background:#94a3b8; }

    .anim-card { background:#f0f7ff; border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden; }
    .anim-card svg { display:block; width:100%; height:auto; }

    .step-info { background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:20px 24px; min-height:96px; }
    .step-title { font-size:.78rem; font-weight:700; color:var(--blue-dark); text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
    .step-text  { font-size:.9rem; color:var(--text); line-height:1.65; }

    .nav-row { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .keyboard-hint { margin-top:6px; text-align:center; }
  </style>
</head>
<body>

<header class="bzwu-header">
  <div class="header-text">
    <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · b.7</span>
    <h1>Säuregerinnung des Kaseins</h1>
    <p>Wie Säure das Kasein ausfällt: Schritt für Schritt</p>
  </div>
  <div class="header-logos">
    <img src="../assets/logos/bzwu.png" alt="BZWU" class="header-logo">
    <img src="../assets/logos/milchtechnologen.svg" alt="Milchtechnologen" class="header-logo">
  </div>
</header>

<main class="page-main">

  <a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

  <div class="anim-wrap">

    <div class="step-dots" id="stepDots"></div>

    <div class="anim-card">
      <!-- viewBox: 0–435 Animation | 436–545 rechte Indikatoren -->
      <svg id="animSvg" viewBox="0 0 545 310" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dotPat" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="1.2" fill="#bfdbfe" opacity="0.5"/>
          </pattern>
          <linearGradient id="phGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#16a34a"/>
            <stop offset="55%"  stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#dc2626"/>
          </linearGradient>
        </defs>

        <!-- Hintergrund Animationsbereich -->
        <rect width="435" height="310" fill="url(#dotPat)"/>
        <rect width="435" height="310" fill="#e0f2fe" opacity="0.25"/>

        <!-- ============================================================
             RECHTE INDIKATOREN  (x 438–545)
             ============================================================ -->

        <!-- MZ / MS Balken -->
        <text x="448" y="17" font-family="system-ui,sans-serif" font-size="9" fill="#0369a1"  font-weight="700" text-anchor="middle">MZ</text>
        <text x="448" y="300" font-family="system-ui,sans-serif" font-size="9" fill="#ea580c" font-weight="700" text-anchor="middle">MS</text>
        <rect x="440" y="25" width="16" height="260" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
        <rect id="mzBar" x="440" y="25" width="16" height="260" rx="4" fill="#93c5fd"/>
        <rect id="msBar" x="440" y="285" width="16" height="0"   rx="4" fill="#fb923c"/>
        <line id="mzMsDivider" x1="438" y1="285" x2="458" y2="285" stroke="#1e293b" stroke-width="1.5"/>

        <!-- pH-Balken -->
        <text x="470" y="17" font-family="system-ui,sans-serif" font-size="9" fill="#374151" font-weight="700" text-anchor="middle">pH</text>
        <rect x="461" y="25" width="18" height="260" rx="9" fill="url(#phGrad)" opacity="0.9"/>
        <line x1="479" y1="25"  x2="484" y2="25"  stroke="#64748b" stroke-width="1.2"/>
        <text x="486" y="29"   font-family="system-ui,sans-serif" font-size="10" fill="#64748b">7</text>
        <line x1="479" y1="112" x2="484" y2="112" stroke="#64748b" stroke-width="1.2"/>
        <text x="486" y="116"  font-family="system-ui,sans-serif" font-size="10" fill="#64748b">6</text>
        <line x1="479" y1="198" x2="484" y2="198" stroke="#64748b" stroke-width="1.2"/>
        <text x="486" y="202"  font-family="system-ui,sans-serif" font-size="10" fill="#64748b">5</text>
        <line x1="479" y1="285" x2="484" y2="285" stroke="#64748b" stroke-width="1.2"/>
        <text x="486" y="289"  font-family="system-ui,sans-serif" font-size="10" fill="#64748b">4</text>
        <polygon id="phMarker" points="480,0 473,-4 473,4" fill="#1e293b"/>
        <text id="phValue" x="505" y="4" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle"></text>

        <!-- ============================================================
             ANIMATIONS-INHALT
             ============================================================ -->

        <!-- Ion-Verbindungen Schritt 3 (Aggregation) -->
        <g id="ionBonds" opacity="0" style="transition:opacity .4s ease"></g>

        <!-- Würfel-Kanten Schritt 4 -->
        <g id="netLines" opacity="0" style="transition:opacity .5s ease"></g>

        <!-- H⁺ Ionen Schritt 2 -->
        <g id="hplusIons" opacity="0" style="transition:opacity .5s ease"></g>

        <!-- Milchsäurebakterien Schritt 2–3 -->
        <g id="bacteria" opacity="0" style="transition:opacity .5s ease"></g>

        <!-- Kasein-Partikel (per JS erzeugt) -->
        <g id="particleLayer"></g>
      </svg>
    </div>

    <div class="step-info">
      <div class="step-title" id="stepTitle"></div>
      <div class="step-text"  id="stepText"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost"   id="prevBtn" onclick="prevStep()">&#8592; Zurück</button>
      <button class="btn btn-primary" id="playBtn" onclick="toggleAutoplay()">&#9654; Abspielen</button>
      <button class="btn btn-ghost"   id="nextBtn" onclick="nextStep()">Weiter &#8594;</button>
    </div>
    <p class="keyboard-hint"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigieren · <kbd>Leertaste</kbd> abspielen</p>

  </div>

</main>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · Philipp Neukomm
</footer>

<script>
/* ================================================================
   DATEN – 4 Schritte, 8 Partikel
   ================================================================ */
// Positionen [step][partikel] = {x,y} im SVG-Koordinatensystem (0–435)
var POS = [
  // Schritt 1: frei schwebend
  [ {x:75,y:65},{x:215,y:50},{x:365,y:68},
    {x:50,y:183},{x:195,y:195},{x:355,y:178},
    {x:110,y:278},{x:262,y:272} ],
  // Schritt 2: gleich (H⁺ erscheinen, Bakterien aktiv)
  [ {x:75,y:65},{x:215,y:50},{x:365,y:68},
    {x:50,y:183},{x:195,y:195},{x:355,y:178},
    {x:110,y:278},{x:262,y:272} ],
  // Schritt 3: Aggregation – zwei Cluster
  [ {x:72,y:60},{x:178,y:58},{x:175,y:162},{x:68,y:162},
    {x:252,y:60},{x:358,y:58},{x:355,y:162},{x:248,y:162} ],
  // Schritt 4: 3D-Würfel (8 Ecken)
  [ {x:100,y:98},{x:250,y:98},{x:250,y:235},{x:100,y:235},
    {x:170,y:53},{x:320,y:53},{x:320,y:190},{x:170,y:190} ],
];

var CUBE_PAIRS = [
  [0,1],[1,2],[2,3],[3,0],   // Vorderseite
  [4,5],[5,6],[6,7],[7,4],   // Rückseite
  [0,4],[1,5],[2,6],[3,7],   // Tiefenkanten
];
var ION_PAIRS = [
  [0,1],[1,2],[2,3],[3,0],   // Cluster 1
  [4,5],[5,6],[6,7],[7,4],   // Cluster 2
];

// MZ-Fraktion (Milchzucker) pro Schritt (0 = vollständig abgebaut)
var MZ_FRAC = [1.0, 0.65, 0.25, 0.05];

var STEPS = [
  {
    ph: 6.7,
    title: 'Schritt 1 – Ausgangslage (pH 6.7)',
    text:  'Kasein ist das Haupteiweiss der Milch. Bei normalem pH (~6.7) ist Kasein überwiegend negativ geladen (zu sehen an den roten −). Aufgrund der negativen Ladungen verteilt sich das Kasein gleichmässig in der Milch. Die Milch bleibt flüssig.',
    chargeOpacity: 1.0, wobble: 5.0,
    showBact: false, showHplus: false, showIonBonds: false, showCube: false,
  },
  {
    ph: 6.0,
    title: 'Schritt 2 – Milchsäurebakterien sind aktiv',
    text:  'Milchsäurebakterien (MSB) vergären Laktose. Als Abbauprodukt entsteht Milchsäure: der pH-Wert sinkt. Die dabei entstehenden H⁺-Ionen (rot) neutralisieren die negativen Ladungen auf den Kaseinmizellen. Dadurch stossen sich die Kaseinmizellen weniger ab.',
    chargeOpacity: 0.5, wobble: 4.0,
    showBact: true, showHplus: true, showIonBonds: false, showCube: false,
  },
  {
    ph: 4.6,
    title: 'Schritt 3 – Anziehung',
    text:  'Die Kaseine ziehen sich gegenseitig immer näher an. Die + und − Verbindungen zwischen den Kaseinmizellen zeigen, wie sie sich zusammenheften. Die Molkenproteine bleiben dabei weiterhin in der Milch vorhanden.',
    chargeOpacity: 0.0, wobble: 2.5,
    showBact: false, showHplus: false, showIonBonds: true, showCube: false,
  },
  {
    ph: 4.5,
    title: 'Schritt 4 – Gallerte entsteht (pH 4.5 = 36–38 °SH)',
    text:  'Es bildet sich ein dreidimensionales Gerüst über die positiven und negativen Ladungen an den Kaseinen. Molkenproteine, Wasser und Fett bleiben innerhalb des Gerüstes gefangen. Bei einem pH von 4.5 (= 36–38 °SH) beginnen Sie mit dem Kühlen des Joghurts.',
    chargeOpacity: 0.0, wobble: 1.8,
    showBact: false, showHplus: false, showIonBonds: false, showCube: true,
  },
];

/* ================================================================
   SVG AUFBAUEN
   ================================================================ */
var NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  var e = document.createElementNS(NS, tag);
  Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
  return e;
}
function chargeCircle(parent, fill, stroke, txt, txtColor, fontSize) {
  parent.appendChild(svgEl('circle', {r:'9', fill:fill, stroke:stroke, 'stroke-width':'1.5'}));
  var t = document.createElementNS(NS,'text');
  t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
  t.setAttribute('font-size', fontSize||'11'); t.setAttribute('font-weight','900');
  t.setAttribute('fill', txtColor); t.setAttribute('font-family','system-ui,sans-serif');
  t.textContent = txt;
  parent.appendChild(t);
}

var CHARGE_OFFSETS = [
  {dx:-26,dy:0},{dx:26,dy:0},{dx:0,dy:-26},{dx:0,dy:26},
  {dx:-19,dy:-19},{dx:19,dy:-19},{dx:-19,dy:19},{dx:19,dy:19},
];

/* ---- H⁺ Ionen (Schritt 2) ---- */
var HPLUS_POS = [
  {x:55,y:105},{x:190,y:35},{x:305,y:42},{x:408,y:100},{x:415,y:228},{x:28,y:270},{x:215,y:260}
];
var hplusLayer = document.getElementById('hplusIons');
var hplusEls = [];
HPLUS_POS.forEach(function(p) {
  var g = svgEl('g', {transform:'translate('+p.x+','+p.y+')'});
  chargeCircle(g, '#dbeafe', '#2563eb', 'H⁺', '#2563eb', '8');
  hplusLayer.appendChild(g);
  hplusEls.push({ el:g, x:p.x, y:p.y, ph:Math.random()*Math.PI*2 });
});

/* ---- Milchsäurebakterien (Schritt 2–3) ---- */
var BACT = [
  {x:168,y:133,rot:30},{x:295,y:143,rot:-18},{x:88,y:148,rot:12},{x:395,y:152,rot:-35}
];
var bactLayer = document.getElementById('bacteria');
var bactEls = [];
BACT.forEach(function(b) {
  var g = svgEl('g', {transform:'translate('+b.x+','+b.y+') rotate('+b.rot+')'});
  g.appendChild(svgEl('ellipse', {rx:'14', ry:'6', fill:'#064e3b', opacity:'.85'}));
  var t = document.createElementNS(NS,'text');
  t.setAttribute('x','0'); t.setAttribute('y','1');
  t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
  t.setAttribute('font-size','6'); t.setAttribute('fill','white'); t.setAttribute('font-family','system-ui');
  t.textContent = 'MSB';
  g.appendChild(t);
  bactLayer.appendChild(g);
  bactEls.push({ el:g, x:b.x, y:b.y, rot:b.rot, ph:Math.random()*Math.PI*2 });
});

/* ---- 8 Kasein-Partikel ---- */
var layer = document.getElementById('particleLayer');
var pEl = [];
for (var pi = 0; pi < 8; pi++) {
  var g = svgEl('g', {id:'p'+pi});
  g.appendChild(svgEl('circle', {r:'19', fill:'#e2e8f0', stroke:'#94a3b8', 'stroke-width':'2'}));
  var lbl = document.createElementNS(NS, 'text');
  lbl.setAttribute('x','0'); lbl.setAttribute('y','1.5');
  lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','middle');
  lbl.setAttribute('font-size','9'); lbl.setAttribute('font-weight','700');
  lbl.setAttribute('fill','#475569'); lbl.setAttribute('font-family','system-ui,sans-serif');
  lbl.textContent = 'Kasein';
  g.appendChild(lbl);

  for (var ci = 0; ci < CHARGE_OFFSETS.length; ci++) {
    var off = CHARGE_OFFSETS[ci];
    var cg = svgEl('g', {
      'class':'neg-charge',
      transform:'translate('+off.dx+','+off.dy+')',
      style:'transition:opacity .55s ease',
    });
    chargeCircle(cg, '#fee2e2', '#dc2626', '−', '#dc2626', '11');
    g.appendChild(cg);
  }
  layer.appendChild(g);
  pEl.push(g);
}

/* ---- Würfel-Kanten (Schritt 4) ---- */
var netLayer = document.getElementById('netLines');
CUBE_PAIRS.forEach(function(pair, idx) {
  netLayer.appendChild(svgEl('line', {
    id:'nl'+idx, stroke:'#334155', 'stroke-width':'2.5',
    'stroke-dasharray':'6,3', 'stroke-linecap':'round',
  }));
});
function updateCubePositions(pos) {
  CUBE_PAIRS.forEach(function(pair, idx) {
    var a = pos[pair[0]], b = pos[pair[1]];
    var line = document.getElementById('nl'+idx);
    line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
    line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
  });
}

/* ---- Ion-Verbindungen (Schritt 3) ---- */
var ionLayer = document.getElementById('ionBonds');
ION_PAIRS.forEach(function(pair, idx) {
  ionLayer.appendChild(svgEl('line', {
    id:'ib_l'+idx, stroke:'#94a3b8', 'stroke-width':'1.8', 'stroke-dasharray':'4,2',
  }));
  var gp = svgEl('g', {id:'ib_p'+idx});
  chargeCircle(gp, '#dbeafe', '#2563eb', '+', '#2563eb', '11');
  ionLayer.appendChild(gp);
  var gm = svgEl('g', {id:'ib_m'+idx});
  chargeCircle(gm, '#fee2e2', '#dc2626', '−', '#dc2626', '11');
  ionLayer.appendChild(gm);
});
function updateIonBondPositions(pos) {
  ION_PAIRS.forEach(function(pair, idx) {
    var a = pos[pair[0]], b = pos[pair[1]];
    var line = document.getElementById('ib_l'+idx);
    line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
    line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
    document.getElementById('ib_p'+idx).setAttribute('transform','translate('+(a.x+(b.x-a.x)*0.3)+','+(a.y+(b.y-a.y)*0.3)+')');
    document.getElementById('ib_m'+idx).setAttribute('transform','translate('+(a.x+(b.x-a.x)*0.7)+','+(a.y+(b.y-a.y)*0.7)+')');
  });
}

/* ================================================================
   ANIMATIONS-ENGINE – durchgehende Bewegung (requestAnimationFrame)
   ================================================================ */
function clone(arr) { return arr.map(function(p){ return {x:p.x, y:p.y}; }); }
function easeInOut(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

var currentStep = 0;
var basePos  = clone(POS[0]);
var livePos  = clone(POS[0]);
var fromPos  = clone(POS[0]);
var transStart = null;
var DURATION = 850;

var phX = [], phY = [], frX = [], frY = [];
for (var i = 0; i < 8; i++) {
  phX.push(Math.random()*Math.PI*2); phY.push(Math.random()*Math.PI*2);
  frX.push(620 + Math.random()*220); frY.push(720 + Math.random()*260);
}

function phToMarkerY(ph) { return 25 + (7.0-ph)/3.0*260; }

function updateMzMs(frac) {
  var totalH = 260, topY = 25;
  var mzH = Math.max(0, Math.round(frac * totalH));
  var msH = totalH - mzH;
  var divY = topY + mzH;
  document.getElementById('mzBar').setAttribute('height', mzH);
  document.getElementById('mzBar').setAttribute('y', topY);
  document.getElementById('msBar').setAttribute('height', msH);
  document.getElementById('msBar').setAttribute('y', divY);
  document.getElementById('mzMsDivider').setAttribute('y1', divY);
  document.getElementById('mzMsDivider').setAttribute('y2', divY);
}

function clock(now) {
  // 1) Schrittübergang
  if (transStart !== null) {
    var t = Math.min((now-transStart)/DURATION, 1);
    var e = easeInOut(t);
    for (var i = 0; i < 8; i++) {
      basePos[i].x = fromPos[i].x + (POS[currentStep][i].x - fromPos[i].x)*e;
      basePos[i].y = fromPos[i].y + (POS[currentStep][i].y - fromPos[i].y)*e;
    }
    if (t >= 1) transStart = null;
  }

  var s = STEPS[currentStep];
  var amp = s.wobble;

  // 2) Wobble auf jede Basis-Position
  for (var i = 0; i < 8; i++) {
    var ox = Math.sin(now/frX[i] + phX[i]) * amp;
    var oy = Math.cos(now/frY[i] + phY[i]) * amp;
    livePos[i].x = basePos[i].x + ox;
    livePos[i].y = basePos[i].y + oy;
    pEl[i].setAttribute('transform','translate('+livePos[i].x+','+livePos[i].y+')');
  }

  // 3) Bindungen / Gerüst folgen
  if (s.showIonBonds) updateIonBondPositions(livePos);
  if (s.showCube)     updateCubePositions(livePos);

  // 4) H⁺-Ionen driften
  if (s.showHplus) {
    hplusEls.forEach(function(he) {
      var dx = Math.sin(now/780 + he.ph) * 4;
      var dy = Math.cos(now/900 + he.ph) * 4;
      he.el.setAttribute('transform','translate('+(he.x+dx)+','+(he.y+dy)+')');
    });
  }

  // 5) Bakterien wackeln leicht
  if (s.showBact) {
    bactEls.forEach(function(be) {
      var dx = Math.sin(now/950 + be.ph) * 3;
      var dy = Math.cos(now/1100 + be.ph) * 3;
      be.el.setAttribute('transform','translate('+(be.x+dx)+','+(be.y+dy)+') rotate('+be.rot+')');
    });
  }

  requestAnimationFrame(clock);
}

/* ---- Schrittwechsel ---- */
function applyStepVisuals() {
  var s = STEPS[currentStep];

  // Ladungen
  document.querySelectorAll('.neg-charge').forEach(function(el) { el.style.opacity = s.chargeOpacity; });

  // Gruppen
  document.getElementById('bacteria').style.opacity  = s.showBact     ? '1' : '0';
  document.getElementById('hplusIons').style.opacity = s.showHplus    ? '1' : '0';
  document.getElementById('ionBonds').style.opacity  = s.showIonBonds ? '1' : '0';
  document.getElementById('netLines').style.opacity  = s.showCube     ? '1' : '0';

  // pH-Marker
  var markerY = phToMarkerY(s.ph);
  document.getElementById('phMarker').setAttribute('transform','translate(0,'+markerY+')');
  var valEl = document.getElementById('phValue');
  valEl.textContent = s.ph.toFixed(1);
  valEl.setAttribute('y', Math.min(markerY+4, 295));

  // MZ/MS Balken
  updateMzMs(MZ_FRAC[currentStep]);

  // Texte
  document.getElementById('stepTitle').textContent = s.title;
  document.getElementById('stepText').textContent  = s.text;

  // Buttons
  document.getElementById('prevBtn').disabled = (currentStep === 0);
  document.getElementById('nextBtn').disabled = (currentStep === STEPS.length-1);

  // Dots
  document.querySelectorAll('.step-dot').forEach(function(d,i) {
    d.classList.toggle('active', i === currentStep);
  });
}

function goToStep(newStep) {
  if (newStep < 0 || newStep >= STEPS.length) return;
  fromPos = clone(basePos);
  currentStep = newStep;
  transStart = performance.now();
  applyStepVisuals();
}

function nextStep() { goToStep(currentStep+1); }
function prevStep() { goToStep(currentStep-1); }

/* ---- Automatisch abspielen ---- */
var autoplay = false, autoTimer = null;
function scheduleNext() {
  autoTimer = setTimeout(function() {
    if (!autoplay) return;
    goToStep((currentStep+1) % STEPS.length);
    scheduleNext();
  }, 3800);
}
function setPlayLabel() {
  document.getElementById('playBtn').innerHTML = autoplay ? '&#10074;&#10074; Pause' : '&#9654; Abspielen';
}
function toggleAutoplay() {
  autoplay = !autoplay;
  setPlayLabel();
  clearTimeout(autoTimer);
  if (autoplay) {
    if (currentStep === STEPS.length-1) goToStep(0);
    scheduleNext();
  }
}

/* ---- Dots + Tastatur ---- */
var dotsWrap = document.getElementById('stepDots');
for (var i = 0; i < STEPS.length; i++) {
  (function(idx) {
    var d = document.createElement('div');
    d.className = 'step-dot';
    d.title = STEPS[idx].title;
    d.addEventListener('click', function() { goToStep(idx); });
    dotsWrap.appendChild(d);
  })(i);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') { nextStep(); }
  if (e.key === 'ArrowLeft')  { prevStep(); }
  if (e.key === ' ')          { e.preventDefault(); toggleAutoplay(); }
});

/* ---- Start ---- */
applyStepVisuals();
setPlayLabel();
requestAnimationFrame(clock);
</script>
</body>
</html>
