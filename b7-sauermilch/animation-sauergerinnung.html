<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation – Säuregerinnung</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; padding:28px 16px 56px; }

    .back-link {
      font-size:0.78rem; color:var(--text-subtle); text-decoration:none;
      display:inline-flex; align-items:center; gap:4px;
      margin-bottom:20px; align-self:flex-start;
    }
    .back-link:hover { color:var(--red); }

    .page-header { text-align:center; margin-bottom:20px; }
    .page-header h1 { font-size:1.1rem; font-weight:600; color:var(--text-muted); margin-bottom:4px; }
    .page-header p  { font-size:0.82rem; color:var(--text-subtle); }

    .anim-wrap { width:560px; max-width:96vw; display:flex; flex-direction:column; gap:16px; }

    /* Step-Dots */
    .step-dots { display:flex; justify-content:center; gap:12px; margin-bottom:4px; }
    .step-dot {
      width:11px; height:11px; border-radius:50%;
      background:var(--border); cursor:pointer;
      transition:background 0.2s, transform 0.15s;
    }
    .step-dot.active   { background:var(--blue-dark); transform:scale(1.25); }
    .step-dot:hover    { background:#94a3b8; }

    /* SVG-Karte */
    .anim-card {
      background:#f0f7ff;
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }
    .anim-card svg { display:block; width:100%; height:auto; }

    /* Beschreibungs-Karte */
    .step-info {
      background:var(--surface);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      padding:20px 24px;
      min-height:90px;
    }
    .step-title {
      font-size:0.78rem; font-weight:700; color:var(--blue-dark);
      text-transform:uppercase; letter-spacing:0.07em; margin-bottom:8px;
    }
    .step-text { font-size:0.9rem; color:var(--text); line-height:1.65; }

    /* Navigation */
    .nav-row { display:flex; justify-content:center; gap:12px; }

    /* Keyboard-Hinweis */
    .keyboard-hint { margin-top:10px; }
  </style>
</head>
<body>

<a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

<div class="page-header">
  <h1>b.7 – Säuregerinnung</h1>
  <p>Klick «Weiter» um die einzelnen Schritte durchzugehen</p>
</div>

<div class="anim-wrap">

  <div class="step-dots" id="stepDots"></div>

  <div class="anim-card">
    <svg id="animSvg" viewBox="0 0 530 310" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gradient für pH-Balken -->
        <linearGradient id="phGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#16a34a"/>
          <stop offset="55%"  stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#dc2626"/>
        </linearGradient>
        <!-- Hintergrund-Gitter (Flüssigkeit) -->
        <pattern id="dotPat" width="20" height="20" patternUnits="userSpaceOnUse">
          <circle cx="10" cy="10" r="1.2" fill="#bfdbfe" opacity="0.5"/>
        </pattern>
      </defs>

      <!-- Hintergrund -->
      <rect width="440" height="310" fill="url(#dotPat)"/>
      <rect width="440" height="310" fill="#e0f2fe" opacity="0.25"/>

      <!-- pH-Balken Hintergrund -->
      <rect x="450" y="25" width="18" height="260" rx="9" fill="url(#phGrad)" opacity="0.9"/>
      <!-- pH-Skala Ticks -->
      <line x1="468" y1="25"  x2="475" y2="25"  stroke="#64748b" stroke-width="1.2"/>
      <text x="477" y="29"  font-family="system-ui,sans-serif" font-size="10" fill="#64748b">7</text>
      <line x1="468" y1="112" x2="475" y2="112" stroke="#64748b" stroke-width="1.2"/>
      <text x="477" y="116" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">6</text>
      <line x1="468" y1="198" x2="475" y2="198" stroke="#64748b" stroke-width="1.2"/>
      <text x="477" y="202" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">5</text>
      <line x1="468" y1="285" x2="475" y2="285" stroke="#64748b" stroke-width="1.2"/>
      <text x="477" y="289" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">4</text>
      <text x="449" y="17"  font-family="system-ui,sans-serif" font-size="9" fill="#64748b" font-weight="600">pH</text>
      <!-- pH-Marker -->
      <polygon id="phMarker" points="440,0 447,4 447,-4" fill="#1e293b"/>
      <!-- pH-Wert Text -->
      <text id="phValue" x="450" y="300" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle"></text>

      <!-- Netzwerklinien (Gallerte, Step 5) -->
      <g id="netLines" opacity="0"></g>

      <!-- Molke-Tröpfchen mit Molkenproteine (Step 5) -->
      <g id="wheyDrops" opacity="0">
        <circle cx="158" cy="127" r="9" fill="#bae6fd" opacity="0.8"/>
        <circle cx="255" cy="122" r="7" fill="#bae6fd" opacity="0.8"/>
        <circle cx="352" cy="128" r="8" fill="#bae6fd" opacity="0.8"/>
        <circle cx="205" cy="212" r="8" fill="#bae6fd" opacity="0.8"/>
        <circle cx="305" cy="210" r="7" fill="#bae6fd" opacity="0.8"/>
        <!-- Legende -->
        <rect x="4" y="285" width="176" height="18" rx="4" fill="white" fill-opacity="0.85"/>
        <circle cx="14" cy="294" r="6" fill="#bae6fd"/>
        <text x="24" y="298" font-family="system-ui,sans-serif" font-size="10" fill="#0369a1">= Molke mit Molkenproteinen (nicht gefällt)</text>
      </g>

      <!-- Milchsäurebakterien (ab Step 2) -->
      <g id="bacteria" opacity="0">
        <g transform="translate(168,133) rotate(30)">
          <ellipse rx="14" ry="6" fill="#064e3b" opacity="0.8"/>
          <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="white" font-family="system-ui">MSB</text>
        </g>
        <g transform="translate(295,143) rotate(-18)">
          <ellipse rx="14" ry="6" fill="#064e3b" opacity="0.8"/>
          <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="white" font-family="system-ui">MSB</text>
        </g>
        <g transform="translate(88,148) rotate(12)">
          <ellipse rx="14" ry="6" fill="#064e3b" opacity="0.8"/>
          <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="white" font-family="system-ui">MSB</text>
        </g>
        <g transform="translate(395,152) rotate(-35)">
          <ellipse rx="14" ry="6" fill="#064e3b" opacity="0.8"/>
          <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="white" font-family="system-ui">MSB</text>
        </g>
        <!-- Laktose → Milchsäure Pfeil -->
        <text x="175" y="110" font-family="system-ui,sans-serif" font-size="9.5" fill="#064e3b" font-weight="600" text-anchor="middle">Laktose → Milchsäure</text>
        <line x1="120" y1="113" x2="232" y2="113" stroke="#064e3b" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
        <defs>
          <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
            <path d="M0,0 L5,2.5 L0,5 Z" fill="#064e3b"/>
          </marker>
        </defs>
      </g>

      <!-- Kasein-Partikel (werden per JS generiert) -->
      <g id="particleLayer"></g>
    </svg>
  </div>

  <div class="step-info">
    <div class="step-title" id="stepTitle"></div>
    <div class="step-text"  id="stepText"></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost"   id="prevBtn" onclick="prevStep()">&#8592; Zurück</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">Weiter &#8594;</button>
  </div>

  <p class="keyboard-hint"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigieren</p>

</div>

<script>
  /* ================================================================
     DATEN
     ================================================================ */

  // Positionen pro Step [step][partikel] = {x, y}  (SVG-Koordinaten)
  var POS = [
    // Step 0: frei schwebend
    [{x:75,y:65},{x:210,y:50},{x:358,y:68},
     {x:50,y:183},{x:193,y:196},{x:352,y:180},
     {x:108,y:278},{x:258,y:273},{x:400,y:272}],
    // Step 1: gleich (Bakterien erscheinen)
    [{x:75,y:65},{x:210,y:50},{x:358,y:68},
     {x:50,y:183},{x:193,y:196},{x:352,y:180},
     {x:108,y:278},{x:258,y:273},{x:400,y:272}],
    // Step 2: etwas näher, Ladungen schwinden
    [{x:92,y:80},{x:208,y:64},{x:342,y:82},
     {x:68,y:180},{x:196,y:190},{x:335,y:180},
     {x:118,y:268},{x:255,y:265},{x:388,y:263}],
    // Step 3: Aggregation (3 Cluster)
    [{x:108,y:88},{x:152,y:68},{x:133,y:128},
     {x:292,y:88},{x:336,y:68},{x:318,y:128},
     {x:190,y:245},{x:237,y:225},{x:285,y:248}],
    // Step 4: Gallerte-Netzwerk
    [{x:105,y:82},{x:205,y:78},{x:305,y:82},
     {x:155,y:168},{x:255,y:163},{x:355,y:168},
     {x:105,y:252},{x:255,y:248},{x:355,y:252}],
  ];

  // Netzwerklinien (nur in Step 4)
  var NET_PAIRS = [
    [0,1],[1,2],       // obere Reihe
    [3,4],[4,5],       // mittlere Reihe
    [6,7],[7,8],       // untere Reihe
    [0,3],[1,4],[2,5], // senkrecht
    [3,6],[4,7],[5,8], // senkrecht
    [0,4],[1,3],[2,4], // Diagonalen
    [3,7],[4,8],[5,7], // Diagonalen
  ];

  var STEPS = [
    {
      ph: 6.7,
      title: 'Schritt 1 – Ausgangslage (pH 6.7)',
      text:  'Kasein ist das Haupteiweiss der Milch. Bei normalem pH (~6.7) trägt Kasein überwiegend negative elektrische Ladungen (−). Gleichnamige Ladungen stossen sich ab → die Mizellen bleiben einzeln in der Lösung verteilt → Milch bleibt flüssig.',
      chargeOpacity: 1.0,
      showBact:  false,
      showNet:   false,
      showWhey:  false,
    },
    {
      ph: 6.0,
      title: 'Schritt 2 – Milchsäuregärung senkt den pH',
      text:  'Milchsäurebakterien (MSB) gewinnen Energie aus Laktose. Als Nebenprodukt entsteht Milchsäure → pH-Wert sinkt. Die negativen Ladungen auf den Kaseinmizellen werden durch die Milchsäure zunehmend neutralisiert – die Abstossung lässt nach.',
      chargeOpacity: 0.55,
      showBact:  true,
      showNet:   false,
      showWhey:  false,
    },
    {
      ph: 4.6,
      title: 'Schritt 3 – Isoelektrischer Punkt (pH 4.6)',
      text:  'Bei pH 4.6, dem isoelektrischen Punkt des Kaseins, sind alle negativen Ladungen vollständig neutralisiert. Die Nettolodung der Kaseinmizellen ist null → die gegenseitige Abstossung fällt weg → die Mizellen können sich annähern.',
      chargeOpacity: 0.0,
      showBact:  true,
      showNet:   false,
      showWhey:  false,
    },
    {
      ph: 4.6,
      title: 'Schritt 4 – Aggregation',
      text:  'Ohne Abstossung ziehen sich die Kaseinmizellen an und lagern sich zusammen (Aggregation). Es bilden sich zunächst kleine Cluster. Wichtig: Molkenproteine werden durch Säure NICHT ausgefällt – sie bleiben gelöst.',
      chargeOpacity: 0.0,
      showBact:  true,
      showNet:   false,
      showWhey:  false,
    },
    {
      ph: 4.5,
      title: 'Schritt 5 – Gallerte entsteht (pH 4.5 = 36–38 °SH)',
      text:  'Die Kaseinmizellen bilden ein dreidimensionales Proteinnetzwerk – die Gallerte. Nur Kasein wird ausgefällt. Molkenproteine (blaue Tröpfchen) werden durch Säure NICHT gefällt; sie verbleiben gelöst in der Molkenphase. Bei pH 4.5 (= 36–38 °SH) wird das Kühlen eingeleitet.',
      chargeOpacity: 0.0,
      showBact:  true,
      showNet:   true,
      showWhey:  true,
    },
  ];

  /* ================================================================
     SVG AUFBAUEN
     ================================================================ */
  var CHARGE_OFFSETS = [
    {dx:-26,dy:0},{dx:26,dy:0},
    {dx:0,dy:-26},{dx:0,dy:26},
    {dx:-19,dy:-19},{dx:19,dy:-19},
    {dx:-19,dy:19},{dx:19,dy:19},
  ];

  var NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
    return e;
  }

  var layer = document.getElementById('particleLayer');

  // Partikel erstellen
  for (var pi = 0; pi < 9; pi++) {
    var g = el('g', {id:'p'+pi});

    // Kreis
    g.appendChild(el('circle', {
      r:'19', fill:'#e2e8f0', stroke:'#94a3b8', 'stroke-width':'2',
    }));
    // Kasein-Label
    var lbl = el('text', {
      x:'0', y:'1.5', 'text-anchor':'middle', 'dominant-baseline':'middle',
      'font-size':'9', 'font-weight':'700', fill:'#475569', 'font-family':'system-ui,sans-serif',
    });
    lbl.textContent = 'Kasein';
    g.appendChild(lbl);

    // Ladungssymbole
    for (var ci = 0; ci < CHARGE_OFFSETS.length; ci++) {
      var off = CHARGE_OFFSETS[ci];
      var ct = el('text', {
        id:'c'+pi+'_'+ci,
        x:off.dx, y:off.dy,
        'text-anchor':'middle', 'dominant-baseline':'middle',
        'font-size':'13', 'font-weight':'900', fill:'#dc2626',
        style:'transition:opacity 0.55s ease',
      });
      ct.textContent = '−';
      g.appendChild(ct);
    }

    layer.appendChild(g);
  }

  // Netzwerklinien erstellen
  var netLayer = document.getElementById('netLines');
  NET_PAIRS.forEach(function(pair) {
    netLayer.appendChild(el('line', {
      id:'nl'+pair[0]+'_'+pair[1],
      stroke:'#64748b', 'stroke-width':'2.5',
      'stroke-dasharray':'5,3', 'stroke-linecap':'round',
    }));
  });

  /* ================================================================
     ANIMATION ENGINE
     ================================================================ */
  var currentStep = 0;
  var animating = false;
  var startTime, startPos, targetPos;
  var DURATION = 900; // ms

  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function animFrame(now) {
    var t = Math.min((now - startTime) / DURATION, 1);
    var e = easeInOut(t);
    for (var i = 0; i < 9; i++) {
      var x = startPos[i].x + (targetPos[i].x - startPos[i].x) * e;
      var y = startPos[i].y + (targetPos[i].y - startPos[i].y) * e;
      document.getElementById('p'+i).setAttribute('transform', 'translate('+x+','+y+')');
    }
    if (t < 1) { requestAnimationFrame(animFrame); }
    else {
      animating = false;
      // Netzwerklinien-Positionen aktualisieren (nach Animation)
      updateNetLines();
    }
  }

  function updateNetLines() {
    var pos = POS[currentStep];
    NET_PAIRS.forEach(function(pair) {
      var a = pos[pair[0]], b = pos[pair[1]];
      var nl = document.getElementById('nl'+pair[0]+'_'+pair[1]);
      if (nl) {
        nl.setAttribute('x1', a.x); nl.setAttribute('y1', a.y);
        nl.setAttribute('x2', b.x); nl.setAttribute('y2', b.y);
      }
    });
  }

  function phToMarkerY(ph) {
    return 25 + (7.0 - ph) / 3.0 * 260;
  }

  function goToStep(newStep, noAnimate) {
    if (newStep < 0 || newStep >= STEPS.length) return;
    if (animating) return;

    var prevStep = currentStep;
    currentStep = newStep;
    var s = STEPS[currentStep];

    // Partikel-Animation starten
    if (!noAnimate && prevStep !== newStep) {
      startPos    = POS[prevStep].map(function(p) { return {x:p.x, y:p.y}; });
      targetPos   = POS[currentStep];
      startTime   = performance.now();
      animating   = true;
      requestAnimationFrame(animFrame);
    } else {
      // Sofort positionieren
      for (var i = 0; i < 9; i++) {
        var p = POS[currentStep][i];
        document.getElementById('p'+i).setAttribute('transform', 'translate('+p.x+','+p.y+')');
      }
      updateNetLines();
    }

    // Ladungen
    for (var i = 0; i < 9; i++) {
      for (var ci = 0; ci < CHARGE_OFFSETS.length; ci++) {
        document.getElementById('c'+i+'_'+ci).style.opacity = s.chargeOpacity;
      }
    }

    // Bakterien
    var bact = document.getElementById('bacteria');
    bact.style.transition = 'opacity 0.5s ease';
    bact.style.opacity = s.showBact ? '1' : '0';

    // Netzwerklinien
    var net = document.getElementById('netLines');
    net.style.transition = 'opacity 0.5s ease';
    net.style.opacity = s.showNet ? '1' : '0';

    // Molke-Tröpfchen
    var whey = document.getElementById('wheyDrops');
    whey.style.transition = 'opacity 0.5s ease';
    whey.style.opacity = s.showWhey ? '1' : '0';

    // pH-Marker
    var markerY = phToMarkerY(s.ph);
    document.getElementById('phMarker').setAttribute('transform', 'translate(0,' + markerY + ')');
    document.getElementById('phValue').textContent = s.ph.toFixed(1);
    document.getElementById('phValue').setAttribute('y', markerY + 20 > 295 ? 295 : markerY + 20);

    // Step-Info
    document.getElementById('stepTitle').textContent = s.title;
    document.getElementById('stepText').textContent  = s.text;

    // Buttons
    document.getElementById('prevBtn').disabled = (currentStep === 0);
    document.getElementById('nextBtn').disabled = (currentStep === STEPS.length - 1);
    document.getElementById('nextBtn').textContent = currentStep === STEPS.length - 1 ? 'Fertig ✓' : 'Weiter →';

    // Step-Dots
    document.querySelectorAll('.step-dot').forEach(function(d, i) {
      d.classList.toggle('active', i === currentStep);
    });
  }

  function nextStep() { goToStep(currentStep + 1); }
  function prevStep() { goToStep(currentStep - 1); }

  /* ================================================================
     DOTS + KEYBOARD
     ================================================================ */
  var dotsWrap = document.getElementById('stepDots');
  for (var i = 0; i < STEPS.length; i++) {
    (function(idx) {
      var d = document.createElement('div');
      d.className = 'step-dot';
      d.title = STEPS[idx].title;
      d.addEventListener('click', function() { goToStep(idx); });
      dotsWrap.appendChild(d);
    })(i);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') nextStep();
    if (e.key === 'ArrowLeft')  prevStep();
  });

  // Init
  goToStep(0, true);
</script>
</body>
</html>
