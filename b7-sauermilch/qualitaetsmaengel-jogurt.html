<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qualitätsmängel Jogurt – Lernkärtchen</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
    }

    .back-link {
      font-size: 0.78rem;
      color: var(--text-subtle);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 20px;
      align-self: flex-start;
    }
    .back-link:hover { color: var(--red); }

    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .page-header p  { font-size: 0.82rem; color: var(--text-subtle); }

    .card-wrap {
      width: 620px;
      max-width: 96vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ---- Flip-Karte ---- */
    .flip-scene {
      width: 100%;
      perspective: 1200px;
      cursor: pointer;
    }

    .flip-inner {
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
      position: relative;
    }

    .flip-scene.flipped .flip-inner { transform: rotateY(180deg); }

    .flip-face {
      width: 100%;
      backface-visibility: hidden;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 32px 30px 24px;
    }

    .flip-back {
      transform: rotateY(180deg);
      position: absolute;
      top: 0; left: 0;
    }

    /* Vorderseite */
    .face-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-subtle);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .face-label .kat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 20px;
    }

    .flip-hint {
      font-size: 0.74rem;
      color: var(--text-subtle);
      text-align: right;
    }

    /* Rückseite */
    .answer-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-subtle);
      margin-bottom: 14px;
    }

    .answer-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.65;
    }

    .answer-text strong { color: var(--blue-dark); }

    .answer-text ul {
      margin: 8px 0 0 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .answer-text li { font-size: 0.9rem; }

    .kat-badge-sm {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 9px;
      border-radius: 20px;
      margin-top: 18px;
    }

    .kat-mikro  { background:#fee2e2; color:#991b1b; }
    .kat-konsis { background:#dbeafe; color:#1e40af; }
    .kat-geschm { background:#d1fae5; color:#065f46; }

    /* ---- Navigation ---- */
    .card-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-counter {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-subtle);
      min-width: 52px;
      text-align: center;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Höhe synchronisieren: Front und Back gleich hoch */
    .flip-inner { min-height: var(--card-h, 240px); }
    .flip-face  { min-height: var(--card-h, 240px); }
  </style>
</head>
<body>

<a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

<div class="page-header">
  <h1>Qualitätsmängel Jogurt</h1>
  <p>K2-Fragen – Klick zum Umdrehen</p>
</div>

<div class="card-wrap">

  <div class="flip-scene" id="flipScene" onclick="flipCard()">
    <div class="flip-inner" id="flipInner">

      <div class="flip-face flip-front" id="cardFront">
        <div class="face-label">
          <span class="kat-dot" id="katDot"></span>
          <span id="katLabel">–</span>
        </div>
        <div class="question-text" id="questionText">–</div>
        <div class="flip-hint">Klick für die Antwort →</div>
      </div>

      <div class="flip-face flip-back" id="cardBack">
        <div class="answer-label">Antwort</div>
        <div class="answer-text" id="answerText"></div>
        <span class="kat-badge-sm" id="katBadge">–</span>
      </div>

    </div>
  </div>

  <div class="card-nav">
    <button class="btn btn-ghost" onclick="prevCard()" aria-label="Zurück">&#8592;</button>
    <span class="nav-counter" id="navCounter">1 / 10</span>
    <button class="btn btn-ghost" onclick="nextCard()" aria-label="Weiter">&#8594;</button>
  </div>

  <div class="card-actions">
    <button class="btn btn-primary" onclick="shuffleCards()">Mischen</button>
    <button class="btn btn-ghost"   onclick="resetCards()">Reihenfolge zurücksetzen</button>
  </div>

</div>

<script>
  var KAT = {
    mikro:   { label: 'Mikrobiologisch',      css: 'kat-mikro',  dot: '#dc2626' },
    konsis:  { label: 'Konsistenz & Struktur', css: 'kat-konsis', dot: '#2563eb' },
    geschm:  { label: 'Geschmack',             css: 'kat-geschm', dot: '#059669' },
  };

  var CARDS = [
    {
      kat: 'mikro',
      frage: 'Erklären Sie, wie es zu einer geblähten Jogurtverpackung kommen kann. Nennen Sie drei mögliche Eintragsquellen für Hefen.',
      antwort: '<strong>Ursache:</strong> Hefen produzieren bei der Gärung CO₂ → Druck in der Verpackung steigt.<br><br><strong>Mögliche Eintragsquellen:</strong><ul><li>Raumluft</li><li>Kontaminierter Grundstoff oder Zucker</li><li>Unsaubere Anlagen oder Kontakt mit den Händen</li></ul>',
    },
    {
      kat: 'mikro',
      frage: 'Beschreiben Sie, auf welchem Weg Schimmelpilze auf die Jogurtoberfläche gelangen können. Bringen Sie ein Beispiel.',
      antwort: 'Schimmelpilze gelangen über <strong>Raumluft</strong> (z. B. offene Fenster im Abfüllraum), über <strong>unsaubere Verpackungen</strong> oder über <strong>Spritzwasser</strong> auf die Oberfläche.',
    },
    {
      kat: 'konsis',
      frage: 'Erklären Sie, welche Produktionsfehler zu einem griesigen Jogurt führen können. Nennen Sie vier Ursachen.',
      antwort: '<ul><li>Nature-Jogurt zu wenig strukturbearbeitet</li><li>Abfallende Bebrütungstemperatur</li><li>Zu hohe Bebrütungstemperatur (Lb.-Anteil zu hoch)</li><li>Zu hohe fettfreie Milchtrockenmasse</li></ul>',
    },
    {
      kat: 'konsis',
      frage: 'Erklären Sie, warum eine ungenügende thermische Belastung der Milch zu einer zu tiefen Viskosität des Jogurts führt.',
      antwort: 'Bei ungenügender Erhitzung werden die <strong>Molkenproteine nicht ausreichend denaturiert</strong>. Sie können dann nicht an der Gelbildung mitwirken → die Proteinstruktur bleibt schwach → der Jogurt wird zu dünnflüssig.',
    },
    {
      kat: 'konsis',
      frage: 'Beschreiben Sie fünf verschiedene Ursachen, die zu einem zu dünnflüssigen Jogurt führen können.',
      antwort: '<ul><li>Ungenügende thermische Belastung der Milch</li><li>Keine oder ungenügende Homogenisation</li><li>Zu starke mechanische Belastung der Gallerte (starkes Rühren, ungeeignete Pumpen)</li><li>Zu tiefe fettfreie Trockenmasse / Verwässerung</li><li>Ungenügende Säuerung</li></ul>',
    },
    {
      kat: 'konsis',
      frage: 'Erklären Sie, warum Erschütterungen während der Gerinnung oder des Kühlens zur Molkenabscheidung führen können. Bringen Sie ein Beispiel.',
      antwort: 'Die Gallerte (Proteingerüst) ist während der Gerinnung und beim Kühlen mechanisch empfindlich. <strong>Erschütterungen</strong> (z. B. Transport auf unebener Strasse) zerstören das Netzwerk → Molke tritt aus der Gelstruktur aus.',
    },
    {
      kat: 'konsis',
      frage: 'Beschreiben Sie zwei mögliche Ursachen für einen fadenziehenden Jogurt. Bringen Sie je ein Beispiel.',
      antwort: '<ul><li><strong>Zu tiefe Bebrütungstemperatur</strong> (z. B. Thermostat defekt) → Bakterien bilden vermehrt Schleimsubstanzen</li><li><strong>Infektion mit fadenziehenden Milchsäurebakterien</strong> (z. B. durch unzureichende Anlagenreinigung)</li></ul>',
    },
    {
      kat: 'geschm',
      frage: 'Erklären Sie, warum ein zu langsames oder ungenügendes Kühlen nach der Bebrütung zu einem übersäuerten Jogurt führt.',
      antwort: 'Bei hoher Temperatur arbeiten die Milchsäurebakterien weiter → <strong>Nachsäuerung</strong>: die Milchsäureproduktion setzt sich fort → Säuregehalt steigt an. Erst bei unter 10 °C wird die Säuerung gestoppt.',
    },
    {
      kat: 'geschm',
      frage: 'Erklären Sie den Einfluss eines hohen Laktobacillenanteils in der Jogurtkultur auf die Säuerung. Bringen Sie ein Beispiel.',
      antwort: 'Laktobazillen säuern <strong>stärker</strong> als Streptokokken. Ein zu hoher Lb.-Anteil führt zur übermässigen Milchsäurebildung → Jogurt wird übersäuert (z. B. wenn die Kultur nicht mehr im Gleichgewicht ist und Lb. dominieren).',
    },
    {
      kat: 'konsis',
      frage: 'Beschreiben Sie, wie Lufteinzug beim Mischen die Qualität des Jogurts beeinflussen kann. Erklären Sie den Zusammenhang mit der Molkenabscheidung.',
      antwort: 'Luftblasen, die durch undichte Leitungen oder falsches Mischen eingetragen werden, <strong>stören die Gallertstruktur</strong>. Das Proteingerüst wird beschädigt → Molke kann sich abscheiden → Molkenlässigkeit.',
    },
  ];

  var order   = CARDS.map(function(_, i) { return i; });
  var current = 0;

  function renderCard() {
    var c   = CARDS[order[current]];
    var kat = KAT[c.kat];

    document.getElementById('katDot').style.background = kat.dot;
    document.getElementById('katLabel').textContent     = kat.label;
    document.getElementById('questionText').textContent = c.frage;
    document.getElementById('answerText').innerHTML     = c.antwort;

    var badge = document.getElementById('katBadge');
    badge.textContent = kat.label;
    badge.className   = 'kat-badge-sm ' + kat.css;

    document.getElementById('navCounter').textContent =
      (current + 1) + ' / ' + order.length;
    document.getElementById('flipScene').classList.remove('flipped');

    /* Karten-Mindesthöhe angleichen */
    requestAnimationFrame(function() {
      var frontH = document.getElementById('cardFront').scrollHeight;
      var backH  = document.getElementById('cardBack').scrollHeight;
      var h      = Math.max(frontH, backH, 220);
      document.getElementById('flipInner').style.minHeight = h + 'px';
      document.getElementById('cardFront').style.minHeight = h + 'px';
      document.getElementById('cardBack').style.minHeight  = h + 'px';
    });
  }

  function flipCard()    { document.getElementById('flipScene').classList.toggle('flipped'); }
  function nextCard()    { current = (current + 1) % order.length; renderCard(); }
  function prevCard()    { current = (current - 1 + order.length) % order.length; renderCard(); }
  function shuffleCards(){ order = shuffle(order); current = 0; renderCard(); }
  function resetCards()  { order = CARDS.map(function(_, i){ return i; }); current = 0; renderCard(); }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  renderCard();
</script>
</body>
</html>
