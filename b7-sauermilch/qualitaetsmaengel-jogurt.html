<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernkärtchen b.7 – Qualitätsmängel Jogurt</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .page-main { display: flex; flex-direction: column; align-items: center; }

    .back-link {
      font-size: 0.78rem;
      color: var(--text-subtle);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 20px;
      align-self: flex-start;
    }
    .back-link:hover { color: var(--red); }

    .filter-wrap   { max-width: 500px; margin-bottom: 24px; }
    .progress-text { margin-bottom: 10px; }

    .progress-bar-wrap {
      width: 360px;
      max-width: 90vw;
      margin-bottom: 28px;
    }

    /* ---- Flashcard ---- */
    .scene {
      width: 440px;
      max-width: 92vw;
      height: 310px;
      perspective: 900px;
      cursor: pointer;
      margin-bottom: 32px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: var(--shadow-md);
    }

    .card-front { background: var(--surface); }
    .card-back  { background: var(--blue-light); transform: rotateY(180deg); }

    .card-category-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
      align-self: flex-start;
    }

    /* Frage (etwas kleiner als card-term, da ganzer Satz) */
    .card-question {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
    }

    .card-hint {
      margin-top: 14px;
      font-size: 0.74rem;
      color: var(--text-subtle);
    }

    /* Antwort */
    .card-answer {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.6;
      overflow-y: auto;
      max-height: 210px;
    }

    .card-answer strong { color: var(--blue-dark); }

    .card-answer ul {
      margin: 6px 0 0 0;
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<header class="bzwu-header">
  <div class="header-text">
  <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · b.7</span>
  <h1>Qualitätsmängel Jogurt</h1>
  <p>Klicken oder <kbd>Leertaste</kbd> zum Umdrehen</p>
  </div>
  <div class="header-logos">
    <img src="../assets/logos/bzwu.png" alt="BZWU" class="header-logo">
    <img src="../assets/logos/milchtechnologen.svg" alt="Milchtechnologen" class="header-logo">
  </div>
</header>

<main class="page-main">
  <a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

  <div class="filter-wrap" id="filterWrap"></div>

  <div class="progress-text" id="progressText"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <div class="scene" id="scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="card-category-badge" id="frontLabel"></span>
        <div class="card-question" id="frontQuestion"></div>
        <div class="card-hint">Karte umdrehen für die Antwort</div>
      </div>
      <div class="card-face card-back">
        <span class="card-category-badge" id="backLabel"></span>
        <div class="card-answer" id="backAnswer"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-ghost"   onclick="prevCard()">&#8592; Zurück</button>
    <button class="btn btn-success" onclick="flipCard()">Umdrehen</button>
    <button class="btn btn-ghost"   onclick="nextCard()">Weiter &#8594;</button>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="shuffleCards()">&#x21C4; Mischen</button>
  </div>

  <p class="keyboard-hint" style="margin-top:12px;">
    <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigieren &nbsp;|&nbsp;
    <kbd>Leertaste</kbd> umdrehen &nbsp;|&nbsp;
    <kbd>S</kbd> mischen
  </p>
</main>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologin / Milchtechnologe EFZ · Philipp Neukomm
</footer>

  <script>
    const ALL_CARDS = [
      {
        category: 'Mikrobiologisch',
        question:  'Erklären Sie, wie es zu einer geblähten Jogurtverpackung kommen kann. Nennen Sie drei Möglichkeiten, wie das passieren kann.',
        answer:    '<strong>Ursache:</strong> Hefen produzieren bei der Gärung CO₂ → Druck in der Verpackung steigt.<br><br><strong>Eintragsquellen:</strong><ul><li>Raumluft</li><li>Kontaminierter Grundstoff oder Zucker</li><li>Unsaubere Anlagen oder Kontakt mit den Händen</li></ul>',
      },
      {
        category: 'Mikrobiologisch',
        question:  'Beschreiben Sie, auf welchem Weg Schimmelpilze auf die Jogurtoberfläche gelangen können. Bringen Sie ein Beispiel.',
        answer:    'Schimmelpilze gelangen über <strong>Raumluft</strong> (z. B. offene Fenster im Abfüllraum), über <strong>unsaubere Verpackungen</strong> oder über <strong>Spritzwasser</strong> auf die Oberfläche.',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Erklären Sie, welche Produktionsfehler zu einem griesigen Jogurt führen können. Nennen Sie vier Ursachen.',
        answer:    '<ul><li>Nature-Jogurt zu wenig strukturbearbeitet</li><li>Abfallende Bebrütungstemperatur</li><li>Zu hohe Bebrütungstemperatur (Lb.-Anteil zu hoch)</li><li>Zu hohe fettfreie Milchtrockenmasse</li></ul>',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Erklären Sie, warum eine ungenügende thermische Belastung der Milch zu einer zu tiefen Viskosität des Jogurts führt.',
        answer:    'Bei ungenügender Erhitzung werden die <strong>Molkenproteine nicht ausreichend denaturiert</strong>. Sie können dann nicht genügend Wasser binden → Jogurt wird zu dünnflüssig.',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Beschreiben Sie fünf verschiedene Ursachen, die zu einem zu dünnflüssigen Jogurt führen können.',
        answer:    '<ul><li>Ungenügende thermische Belastung der Milch</li><li>Keine oder ungenügende Homogenisation</li><li>Zu starke mechanische Belastung der Gallerte (starkes Rühren, ungeeignete Pumpen)</li><li>Zu tiefe fettfreie Trockenmasse / Verwässerung</li><li>Ungenügende Säuerung</li></ul>',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Erklären Sie, warum Erschütterungen während der Gerinnung oder des Kühlens zur Molkenabscheidung führen können. Bringen Sie ein Beispiel.',
        answer:    'Die Gallerte ist während der Gerinnung und beim Kühlen mechanisch empfindlich. <strong>Erschütterungen</strong> (z. B. Transport auf unebener Strasse) zerstören das Proteingerüst → Molke tritt aus.',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Beschreiben Sie, wie Lufteinzug beim Mischen die Qualität des Jogurts beeinflussen kann. Erklären Sie den Zusammenhang mit der Molkenabscheidung.',
        answer:    'Luftblasen, die durch undichte Leitungen oder falsches Mischen eingetragen werden, <strong>stören die Gallertstruktur</strong>. Das Proteingerüst wird beschädigt → Molke scheidet sich ab → Molkenlässigkeit.',
      },
      {
        category: 'Konsistenz & Struktur',
        question:  'Beschreiben Sie zwei mögliche Ursachen für einen fadenziehenden Jogurt. Bringen Sie je ein Beispiel.',
        answer:    '<ul><li><strong>Zu tiefe Bebrütungstemperatur</strong> (z. B. Thermostat defekt) → Fadenziehende Milchsäurebakterien sind im Vorteil</li><li><strong>Infektion mit fadenziehenden Milchsäurebakterien</strong> (z. B. durch unzureichende Anlagenreinigung)</li></ul>',
      },
      {
        category: 'Geschmack',
        question:  'Erklären Sie, warum ein zu langsames oder ungenügendes Kühlen nach der Bebrütung zu einem übersäuerten Jogurt führt.',
        answer:    'Bei hoher Temperatur arbeiten die Milchsäurebakterien weiter → <strong>Nachsäuerung</strong>: Milchsäureproduktion setzt sich fort → Säuregehalt steigt an. Erst unter 10 °C wird die Säuerung gestoppt.',
      },
      {
        category: 'Geschmack',
        question:  'Erklären Sie den Einfluss eines hohen Laktobazillenanteils in der Jogurtkultur auf die Säuerung. Bringen Sie ein Beispiel.',
        answer:    'Laktobazillen säuern <strong>stärker</strong> als Streptokokken. Ein zu hoher Lb.-Anteil führt zu übermässiger Milchsäurebildung → Jogurt wird übersäuert (z. B. wenn die Kultur aus dem Gleichgewicht gerät und Lb. dominieren).',
      },
    ];

    const CATEGORY_COLORS = {
      'Mikrobiologisch':     { bg: '#ffedd5', fg: '#9a3412' },
      'Konsistenz & Struktur': { bg: '#dbeeff', fg: '#1e4e8c' },
      'Geschmack':           { bg: '#dcfce7', fg: '#15803d' },
    };

    let deck = [...ALL_CARDS];
    let currentIndex = 0;
    let isFlipped = false;
    let activeCategory = 'Alle';

    function getFilteredDeck() {
      return activeCategory === 'Alle' ? [...ALL_CARDS]
        : ALL_CARDS.filter(c => c.category === activeCategory);
    }

    function renderFilters() {
      const wrap = document.getElementById('filterWrap');
      const categories = ['Alle', ...Object.keys(CATEGORY_COLORS)];
      wrap.innerHTML = categories.map(cat => {
        const count = cat === 'Alle' ? ALL_CARDS.length
          : ALL_CARDS.filter(c => c.category === cat).length;
        return `<button class="filter-btn ${cat === activeCategory ? 'active' : ''}"
                  onclick="setCategory('${cat}')">${cat} <span style="opacity:0.65;font-size:0.68rem">${count}</span></button>`;
      }).join('');
    }

    function setCategory(cat) {
      activeCategory = cat;
      deck = getFilteredDeck();
      currentIndex = 0;
      renderFilters();
      showCard();
    }

    function shuffleCards() {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      currentIndex = 0;
      showCard(true);
    }

    function showCard(forceUnflip = false) {
      if (isFlipped || forceUnflip) {
        isFlipped = false;
        document.getElementById('card').classList.remove('flipped');
      }
      const c   = deck[currentIndex];
      const col = CATEGORY_COLORS[c.category] || { bg: '#f1f5f9', fg: '#4a5568' };

      document.getElementById('frontQuestion').textContent = c.question;
      document.getElementById('backAnswer').innerHTML = c.answer;

      ['frontLabel', 'backLabel'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent   = c.category;
        el.style.background = col.bg;
        el.style.color      = col.fg;
      });

      const total = deck.length;
      document.getElementById('progressText').textContent = `Karte ${currentIndex + 1} von ${total}`;
      document.getElementById('progressBar').style.width  = `${((currentIndex + 1) / total) * 100}%`;
    }

    function flipCard() {
      isFlipped = !isFlipped;
      document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() { currentIndex = (currentIndex + 1) % deck.length; showCard(true); }
    function prevCard() { currentIndex = (currentIndex - 1 + deck.length) % deck.length; showCard(true); }

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft')  prevCard();
      if (e.key === 's' || e.key === 'S') shuffleCards();
    });

    renderFilters();
    showCard();
  </script>
</body>
</html>
