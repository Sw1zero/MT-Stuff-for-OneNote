<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernkärtchen b.7 – Sauermilchprodukte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      color: #1a202c;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 28px;
    }

    .progress {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 14px;
      min-width: 260px;
      text-align: center;
    }

    .progress-bar-wrap {
      width: 340px;
      max-width: 90vw;
      height: 4px;
      background: #cbd5e0;
      border-radius: 2px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #4299e1;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* --- card scene --- */
    .scene {
      width: 420px;
      max-width: 90vw;
      height: 260px;
      perspective: 900px;
      cursor: pointer;
      margin-bottom: 32px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-front {
      background: #ffffff;
    }

    .card-back {
      background: #ebf8ff;
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      align-self: flex-start;
    }

    .card-front .card-label {
      background: #edf2f7;
      color: #718096;
    }

    .card-back .card-label {
      background: #bee3f8;
      color: #2b6cb0;
    }

    .card-term {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a202c;
      line-height: 1.3;
    }

    .card-hint {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #a0aec0;
    }

    .card-explanation {
      font-size: 1.05rem;
      color: #2d3748;
      line-height: 1.55;
    }

    /* --- controls --- */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-prev, .btn-next {
      background: #ffffff;
      color: #4a5568;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    .btn-prev:hover, .btn-next:hover { background: #edf2f7; }

    .btn-shuffle {
      background: #4299e1;
      color: #fff;
      box-shadow: 0 2px 8px rgba(66,153,225,0.3);
    }

    .btn-shuffle:hover { background: #3182ce; }

    .btn-flip {
      background: #48bb78;
      color: #fff;
      box-shadow: 0 2px 8px rgba(72,187,120,0.3);
    }

    .btn-flip:hover { background: #38a169; }

    /* --- category filter --- */
    .filter-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
      margin-bottom: 28px;
    }

    .filter-btn {
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #cbd5e0;
      background: #fff;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4299e1;
      border-color: #4299e1;
      color: #fff;
    }

    .keyboard-hint {
      font-size: 0.72rem;
      color: #a0aec0;
      margin-top: 4px;
    }

    .keyboard-hint kbd {
      background: #edf2f7;
      color: #4a5568;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.7rem;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <h1>Lernkärtchen – b.7 Sauermilchprodukte</h1>
  <p class="subtitle">Klicken Sie auf die Karte oder drücken Sie <kbd>Leertaste</kbd> zum Umdrehen</p>

  <div class="filter-wrap" id="filterWrap"></div>

  <div class="progress" id="progressText"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <div class="scene" id="scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="card-label" id="frontLabel"></span>
        <div class="card-term" id="frontTerm"></div>
        <div class="card-hint">Karte umdrehen für die Erklärung</div>
      </div>
      <div class="card-face card-back">
        <span class="card-label" id="backLabel"></span>
        <div class="card-explanation" id="backExplanation"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-prev" onclick="prevCard()">&#8592; Zurück</button>
    <button class="btn-flip" onclick="flipCard()">Umdrehen</button>
    <button class="btn-next" onclick="nextCard()">Weiter &#8594;</button>
  </div>
  <div class="controls">
    <button class="btn-shuffle" onclick="shuffle()">&#x21C4; Mischen</button>
  </div>

  <p class="keyboard-hint">
    <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigieren &nbsp;|&nbsp; <kbd>Leertaste</kbd> umdrehen &nbsp;|&nbsp; <kbd>S</kbd> mischen
  </p>

  <script>
    const ALL_CARDS = [
      // Mikrobiologie & Kulturen
      { term: "Milchsäurebakterien (MSB)", explanation: "Mikroorganismen, die Laktose zu Milchsäure vergären und so die Sauermilch herstellen.", category: "Mikrobiologie" },
      { term: "Milchsäuregärung", explanation: "Stoffwechselprozess: MSB gewinnen Energie aus Laktose, als Nebenprodukt entsteht Milchsäure.", category: "Mikrobiologie" },
      { term: "Streptococcus thermophilus (Sc)", explanation: "Jogurtbakterium, Temperaturoptimum 37–42 °C; viscositätserhöhend, säuert zu Beginn der Bebrütung stark.", category: "Mikrobiologie" },
      { term: "Lactobacillus delbrueckii ssp. bulgaricus (Lb)", explanation: "Jogurtbakterium, Temperaturoptimum 40–45 °C; Endsäurebildner, neigt zum Nachsäuern.", category: "Mikrobiologie" },
      { term: "Symbiose (Jogurtbakterien)", explanation: "Lb spalten Milcheiweiss auf und stellen Sc Aminosäuren bereit. Sc senkt den pH-Wert und ermöglicht Lb schnelleres Wachstum.", category: "Mikrobiologie" },
      { term: "proteolytisch", explanation: "Eiweissspaltend; Lb spalten Milcheiweiss auf und stellen so Aminosäuren für Streptococcus thermophilus bereit.", category: "Mikrobiologie" },
      { term: "koloniebildende Einheiten (KBE)", explanation: "Messgrösse für lebende Bakterien; Jogurt muss gesetzlich mind. 10 Mio. KBE/g enthalten.", category: "Mikrobiologie" },
      { term: "thermophil", explanation: "Bakterien mit Temperaturoptimum bei 40–45 °C, z. B. Jogurtbakterien.", category: "Mikrobiologie" },
      { term: "mesophil", explanation: "Bakterien mit Temperaturoptimum bei ca. 20–30 °C, z. B. Rahmsäurewecker für nordische Sauermilch.", category: "Mikrobiologie" },
      { term: "Direktstarterkultur", explanation: "Gebrauchsfertige Kultur, die direkt zur Jogurtmilch dosiert wird; kein Voranzüchten nötig.", category: "Mikrobiologie" },
      { term: "Betriebskultur", explanation: "Im Betrieb selbst hergestellte Flüssigkultur; die Bakterien sind bereits mit Wasser versorgt und verkürzen so die Bebrütungszeit.", category: "Mikrobiologie" },
      { term: "lyophilisiert", explanation: "Gefriergetrocknet; eine Handelsform von Kulturen (neben Tiefgefrierkultur und Flüssigkultur).", category: "Mikrobiologie" },
      { term: "probiotisch", explanation: "Mikroorganismen, die gesundheitsfördernd wirken, weil sie die Magen-Darm-Passage überleben und sich im Dickdarm ansiedeln.", category: "Mikrobiologie" },
      { term: "Kefirkörner / Kefirpilze", explanation: "Träger der Kefirkultur; bestehen aus Eiweiss und Kohlenhydraten, auf denen MSB und Hefen in Symbiose leben.", category: "Mikrobiologie" },

      // Physikalisch-chemische Prozesse
      { term: "Laktose", explanation: "Milchzucker; Substrat (Energiequelle) für die Milchsäuregärung der MSB.", category: "Chemie & Physik" },
      { term: "Milchsäure", explanation: "Nebenprodukt der Milchsäuregärung; senkt den pH-Wert der Milch und führt zur Kaseingerinnung.", category: "Chemie & Physik" },
      { term: "Kasein", explanation: "Haupteiweiss der Milch; trägt in normaler Milch überwiegend negative Ladungen und bleibt einzeln gelöst.", category: "Chemie & Physik" },
      { term: "Säuregerinnung", explanation: "Milchsäure neutralisiert die negativen Ladungen der Kaseinkügelchen; diese ziehen sich an und bilden ein dreidimensionales Netzwerk (Gallerte).", category: "Chemie & Physik" },
      { term: "Molkenproteine", explanation: "Eiweissanteile in der wässrigen Milchphase; werden durch Säure nicht gefällt, aber durch Hitze denaturiert.", category: "Chemie & Physik" },
      { term: "Denaturierung der Molkenproteine", explanation: "Entfaltung der Molkenproteine bei 85–95 °C; vergrössert ihre Oberfläche, sodass mehr Wasser gebunden wird → weniger Molkenabscheidung.", category: "Chemie & Physik" },
      { term: "Gallerte", explanation: "Gelartige, dreidimensionale Netzstruktur aus Kasein; entsteht durch die Säuregerinnung und hält Wasser und andere Milchbestandteile eingeschlossen.", category: "Chemie & Physik" },
      { term: "Synärese", explanation: "Zusammenziehen der Gallerte unter Abpressung von Molke; bei Säuregerinnung schwächer als bei Labgerinnung.", category: "Chemie & Physik" },
      { term: "Viskosität", explanation: "Dickflüssigkeit / Zähigkeit; wichtige Qualitätsgrösse bei Jogurt. Wird durch fTM, Homogenisation und Kultur beeinflusst.", category: "Chemie & Physik" },
      { term: "pH-Wert", explanation: "Mass für den Säuregehalt; das Kühlen der Jogurtgallerte wird bei pH 4,5 eingeleitet (= 36–38 °SH).", category: "Chemie & Physik" },
      { term: "Säuregrad (°SH)", explanation: "Schweizer Mass für die titrierbare Säure; Kühlen bei 36–38 °SH, was einem pH-Wert von 4,5 entspricht.", category: "Chemie & Physik" },
      { term: "Nachsäuern", explanation: "Unerwünschte Säurezunahme nach der Bebrütung durch verbleibende Aktivität der MSB, auch bei Kühltemperatur.", category: "Chemie & Physik" },

      // Produktionsschritte
      { term: "Standardisieren", explanation: "Einstellen des Fettgehalts der Jogurtmilch auf den vorgesehenen Rezepturwert durch Zugabe von Rahm oder Magermilch.", category: "Produktion" },
      { term: "Erhöhung der fettfreien Trockenmasse (fTM)", explanation: "Zugabe von Magermilchpulver, Milchproteinkonzentrat oder WPC; erhöht Viskosität und vermindert Molkenabscheidung um 1,5–3 %.", category: "Produktion" },
      { term: "Homogenisieren", explanation: "Zerkleinerung der Fettkügelchen unter Druck (180–220 bar); verhindert Aufrahmung, verbessert Wasserbindung und Mundgefühl.", category: "Produktion" },
      { term: "Hitzebehandlung (Jogurtmilch)", explanation: "85–95 °C während 2–10 Minuten; bewirkt starke Denaturierung der Molkenproteine, deutlich höher als normale Pasteurisierung.", category: "Produktion" },
      { term: "Impfen", explanation: "Zugabe der Jogurtkultur (2 % Betriebskultur oder Direktstarter) zur abgekühlten Jogurtmilch unter hygienischen Bedingungen.", category: "Produktion" },
      { term: "Bebrüten", explanation: "Inkubation bei 40–44 °C während 4–7 Stunden; MSB vergären Laktose, pH-Wert sinkt, Gallerte entsteht.", category: "Produktion" },
      { term: "Strukturbearbeitung", explanation: "Aufrühren / Glätten der Gallerte beim gerührten Jogurt (z. B. Spaltenfilter, Druckhalteventil); Griessigkeit kann dadurch behoben werden.", category: "Produktion" },
      { term: "Warmmischverfahren", explanation: "Früchte werden bei 20–30 °C zur Jogurtgallerte gemischt; Jogurt dickt in der Verpackung weiter nach.", category: "Produktion" },
      { term: "Kaltmischverfahren", explanation: "Früchte werden bei < 5 °C gemischt; bietet zeitliche Flexibilität (Nature-Jogurt und Fruchtzugabe können an verschiedenen Tagen erfolgen).", category: "Produktion" },
      { term: "Nachpasteurisation", explanation: "Erneute Erhitzung des Trinkjogurts vor dem Abfüllen; verlängerte Haltbarkeit, keine lebenden MSB mehr im Produkt.", category: "Produktion" },
      { term: "Sterilluftüberdruck", explanation: "Schutz offener Produktionsanlagen durch steril gefilterte Luft; erzeugt leichten Überdruck und verhindert Hefen-/Schimmelinfektion.", category: "Produktion" },

      // Zutaten & Zusatzstoffe
      { term: "Fruchtgrundstoff", explanation: "Mischung aus ca. 50 % Früchten und 50 % Zucker; pasteurisiert, bei Kühltemperatur gelagert, mehrere Wochen haltbar.", category: "Zutaten" },
      { term: "Molkenproteinkonzentrat (WPC)", explanation: "Flüssige Alternative zur Trockenmasse-Erhöhung (Ultrafiltrat aus Molke); einfache Zudosierung ohne Staubentwicklung.", category: "Zutaten" },
      { term: "Verdickungsmittel", explanation: "Zusatzstoff im Fruchtgrundstoff; verhindert Entmischung der Frucht-Zuckermasse.", category: "Zutaten" },
      { term: "Strukturstabilisator", explanation: "Nötig bei Trinkjogurt; verhindert Molkenabscheidung nach intensiver mechanischer Bearbeitung der Gallerte.", category: "Zutaten" },
      { term: "Allergene", explanation: "Bestandteile, die Allergien auslösen können (z. B. Haselnüsse in Grundstoffen); Abfüllung von allergenhaltigen Sorten stets am Schluss der Charge.", category: "Zutaten" },

      // Rechtliche Grundlagen
      { term: "VLtH", explanation: "Verordnung über Lebensmittel tierischer Herkunft; legt gesetzliche Anforderungen an Sauermilchprodukte fest (Keimzahl, Fettgehalt, Sachbezeichnung).", category: "Recht & Qualität" },
      { term: "Sachbezeichnung «Jogurt»", explanation: "Darf nur verwendet werden, wenn: Kuhmilch + Sc thermophilus + Lb delbrueckii (oder andere Lactobacillen) + mind. 10 Mio. KBE/g im Endprodukt.", category: "Recht & Qualität" },
      { term: "Fettgehaltsstufen (Jogurt)", explanation: "Magerjogurt: max. 5 g/kg | Teilentrahmt: 5–35 g/kg | Vollmilchjogurt: mind. 35 g/kg | Rahmangereicherter: mind. 50 g/kg – bezogen auf den Milchanteil.", category: "Recht & Qualität" },
      { term: "Mindesthaltbarkeitsdatum (MHD)", explanation: "Bei Jogurt 18–28 Tage; muss auf der Verpackung deklariert sein.", category: "Recht & Qualität" },

      // Qualitätsmängel
      { term: "Griessigkeit", explanation: "Konsistenzmangel: körnige, sandige Struktur. Ursachen: zu tiefe Bebrütungstemperatur, ungenügende Strukturbearbeitung, zu hohe fTM.", category: "Qualitätsmängel" },
      { term: "Molkenlässig", explanation: "Wässrige Schicht im Jogurt (Synärese). Ursachen: ungenügende Denaturierung der Molkenproteine, keine Homogenisation, Erschütterungen während der Gerinnung.", category: "Qualitätsmängel" },
      { term: "Übersäuert", explanation: "pH-Wert zu tief, Jogurt zu sauer. Ursachen: zu lange Bebrütungszeit, langsames Kühlen, unterbrochene Kühlkette, hoher Laktobacillenanteil.", category: "Qualitätsmängel" },
      { term: "Fadenziehend", explanation: "Gallerte zieht Fäden. Ursachen: Infektion mit fadenziehenden MSB; zu tiefe Bebrütungstemperatur.", category: "Qualitätsmängel" },
      { term: "Geblähte Verpackung", explanation: "Verpackung durch Gasbildung aufgebläht. Ursache: Hefeinfektion (über Raumluft, Grundstoff oder unsaubere Anlagen).", category: "Qualitätsmängel" },
    ];

    const CATEGORY_COLORS = {
      "Mikrobiologie":    "#e9d8fd",
      "Chemie & Physik":  "#bee3f8",
      "Produktion":       "#c6f6d5",
      "Zutaten":          "#fefcbf",
      "Recht & Qualität": "#fed7d7",
      "Qualitätsmängel":  "#fbd38d",
    };

    const CATEGORY_TEXT = {
      "Mikrobiologie":    "#553c9a",
      "Chemie & Physik":  "#2b6cb0",
      "Produktion":       "#22543d",
      "Zutaten":          "#744210",
      "Recht & Qualität": "#822727",
      "Qualitätsmängel":  "#7b341e",
    };

    let deck = [...ALL_CARDS];
    let currentIndex = 0;
    let isFlipped = false;
    let activeCategory = "Alle";

    function getFilteredDeck() {
      if (activeCategory === "Alle") return [...ALL_CARDS];
      return ALL_CARDS.filter(c => c.category === activeCategory);
    }

    function renderFilters() {
      const wrap = document.getElementById("filterWrap");
      const categories = ["Alle", ...Object.keys(CATEGORY_COLORS)];
      wrap.innerHTML = categories.map(cat => `
        <button class="filter-btn ${cat === activeCategory ? "active" : ""}"
                onclick="setCategory('${cat}')">${cat}
          ${cat !== "Alle" ? `<span style="font-size:0.68rem;opacity:0.7"> (${ALL_CARDS.filter(c=>c.category===cat).length})</span>` : ""}
        </button>
      `).join("");
    }

    function setCategory(cat) {
      activeCategory = cat;
      deck = getFilteredDeck();
      currentIndex = 0;
      renderFilters();
      showCard();
    }

    function shuffle() {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      currentIndex = 0;
      showCard(true);
    }

    function showCard(forceUnflip = false) {
      if (isFlipped || forceUnflip) {
        isFlipped = false;
        document.getElementById("card").classList.remove("flipped");
      }

      const c = deck[currentIndex];
      document.getElementById("frontTerm").textContent = c.term;
      document.getElementById("backExplanation").textContent = c.explanation;

      const bg = CATEGORY_COLORS[c.category] || "#edf2f7";
      const fg = CATEGORY_TEXT[c.category] || "#4a5568";

      document.getElementById("frontLabel").textContent = c.category;
      document.getElementById("frontLabel").style.background = bg;
      document.getElementById("frontLabel").style.color = fg;

      document.getElementById("backLabel").textContent = c.category;
      document.getElementById("backLabel").style.background = bg;
      document.getElementById("backLabel").style.color = fg;

      const total = deck.length;
      document.getElementById("progressText").textContent = `Karte ${currentIndex + 1} von ${total}`;
      document.getElementById("progressBar").style.width = `${((currentIndex + 1) / total) * 100}%`;
    }

    function flipCard() {
      isFlipped = !isFlipped;
      document.getElementById("card").classList.toggle("flipped");
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % deck.length;
      showCard(true);
    }

    function prevCard() {
      currentIndex = (currentIndex - 1 + deck.length) % deck.length;
      showCard(true);
    }

    document.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
      if (e.key === "ArrowRight") nextCard();
      if (e.key === "ArrowLeft")  prevCard();
      if (e.key === "s" || e.key === "S") shuffle();
    });

    // init
    renderFilters();
    showCard();
  </script>
</body>
</html>
