<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wahr oder Falsch – Sauermilchprodukte</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--red); }

    .game-wrap {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-size: 0.84rem;
      color: var(--text-muted);
    }
    .score-bar strong { color: var(--text); font-size: 1rem; }
    .score-correct { color: #16a34a; font-weight: 700; }
    .score-wrong   { color: var(--red); font-weight: 700; }

    /* Swipe hint */
    .swipe-hint {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .hint-left  { color: var(--red);  }
    .hint-right { color: #16a34a; }

    /* Card stack */
    .card-stack {
      position: relative;
      height: 300px;
      margin-bottom: 1.5rem;
      touch-action: none;
    }

    .swipe-card {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: grab;
      user-select: none;
      will-change: transform;
      transition: box-shadow 0.15s;
    }
    .swipe-card:active { cursor: grabbing; }

    /* Background cards (stack effect) */
    .swipe-card.behind-1 {
      transform: scale(0.96) translateY(8px);
      z-index: 1;
      box-shadow: var(--shadow-sm);
      pointer-events: none;
    }
    .swipe-card.behind-2 {
      transform: scale(0.92) translateY(16px);
      z-index: 0;
      box-shadow: none;
      pointer-events: none;
    }
    .swipe-card.top {
      z-index: 2;
      transition: transform 0.08s ease-out, box-shadow 0.15s;
    }
    .swipe-card.top.snapping {
      transition: transform 0.35s cubic-bezier(0.25, 1.4, 0.5, 1), box-shadow 0.15s;
    }
    .swipe-card.top.flying-right {
      transition: transform 0.38s ease-in, opacity 0.38s ease-in;
    }
    .swipe-card.top.flying-left {
      transition: transform 0.38s ease-in, opacity 0.38s ease-in;
    }

    .card-number {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 1rem;
    }
    .card-statement {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      flex: 1;
      display: flex;
      align-items: center;
    }

    /* Vote overlays */
    .vote-overlay {
      position: absolute;
      top: 1.5rem;
      padding: 0.35rem 0.9rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: rotate(-15deg);
      pointer-events: none;
      border: 3px solid;
    }
    .vote-wahr {
      right: 1.5rem;
      color: #16a34a;
      border-color: #16a34a;
      transform: rotate(15deg);
    }
    .vote-falsch {
      left: 1.5rem;
      color: var(--red);
      border-color: var(--red);
      transform: rotate(-15deg);
    }

    /* Action buttons */
    .action-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover  { transform: scale(1.1); }
    .action-btn:active { transform: scale(0.95); }
    .btn-falsch {
      background: var(--red-light);
      color: var(--red);
      box-shadow: 0 2px 8px rgba(242,0,48,0.18);
    }
    .btn-wahr {
      background: #dcfce7;
      color: #16a34a;
      box-shadow: 0 2px 8px rgba(22,163,74,0.18);
    }

    /* Feedback toast */
    .feedback-toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 0.75rem 1.25rem;
      box-shadow: var(--shadow-lg);
      font-size: 0.84rem;
      max-width: 340px;
      width: 90%;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      border-left: 4px solid var(--border);
    }
    .feedback-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .feedback-toast.correct { border-left-color: #16a34a; }
    .feedback-toast.wrong   { border-left-color: var(--red); }
    .feedback-label {
      font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .feedback-label.correct { color: #16a34a; }
    .feedback-label.wrong   { color: var(--red); }

    /* End screen */
    .end-screen {
      display: none;
      text-align: center;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 2.5rem 1.5rem;
      box-shadow: var(--shadow-md);
    }
    .end-screen.show { display: block; }
    .end-score {
      font-size: 3rem;
      font-weight: 800;
      color: var(--red);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .end-score span { font-size: 1.2rem; color: var(--text-muted); font-weight: 400; }
    .end-msg {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .keyboard-hint { margin-top: 0.5rem; }
  </style>
</head>
<body>

<header class="bzwu-header">
  <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologie EFZ · b.7</span>
  <h1>Wahr oder Falsch?</h1>
  <p>Sauermilchprodukte · Swipe rechts = Wahr · Swipe links = Falsch</p>
</header>

<main class="page-main">
  <a class="back-link" href="../index.html">← Alle Lerntools</a>

  <div class="game-wrap">

    <div class="score-bar">
      <span>Karte <strong id="cardNum">1</strong> / 20</span>
      <span>
        <span class="score-correct" id="scoreCorrect">0</span> richtig &nbsp;
        <span class="score-wrong"   id="scoreWrong">0</span> falsch
      </span>
    </div>

    <div class="swipe-hint">
      <span class="hint-left">← Falsch</span>
      <span class="hint-right">Wahr →</span>
    </div>

    <div class="card-stack" id="cardStack"></div>

    <div class="action-btns">
      <button type="button" class="action-btn btn-falsch" onclick="swipe('left')"  title="Falsch">✕</button>
      <button type="button" class="action-btn btn-wahr"   onclick="swipe('right')" title="Wahr">✓</button>
    </div>

    <p class="keyboard-hint">
      <kbd>←</kbd> Falsch &nbsp; <kbd>→</kbd> Wahr
    </p>

    <div class="end-screen" id="endScreen">
      <div class="end-score" id="endScore">0 <span>/ 20</span></div>
      <div class="end-msg"   id="endMsg"></div>
      <button type="button" class="btn btn-primary" onclick="startGame()">Nochmals spielen</button>
    </div>

  </div>
</main>

<div class="feedback-toast" id="feedbackToast">
  <div class="feedback-label" id="feedbackLabel"></div>
  <div id="feedbackText"></div>
</div>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologie EFZ · Philipp Neukomm
</footer>

<script>
var CARDS = [
  {
    statement: 'Jogurt muss gemäss VLtH mit Streptococcus thermophilus und Lactobacillus delbrueckii ssp. bulgaricus hergestellt werden.',
    answer: true,
    explanation: 'Die VLtH schreibt genau diese beiden Bakterienarten vor – oder andere gesundheitlich unbedenkliche Lactobazillen.'
  },
  {
    statement: 'Im Endprodukt Jogurt müssen mindestens 10 Millionen koloniebildende Einheiten Jogurtbakterien pro Gramm enthalten sein.',
    answer: true,
    explanation: 'Deshalb ist es rechtlich nicht möglich, Jogurt vor dem Abfüllen zu pasteurisieren.'
  },
  {
    statement: 'Die Jogurtmilch wird auf 85–95 °C erhitzt, damit die Molkenproteine denaturieren und mehr Wasser binden.',
    answer: true,
    explanation: 'Die starke Hitzebehandlung denaturiert die Molkenproteine – gerührter Jogurt wird dickflüssiger, stichfester Jogurt scheidet weniger Molke ab.'
  },
  {
    statement: 'Die optimale Bebrütungstemperatur für Jogurt liegt zwischen 40 und 44 °C.',
    answer: true,
    explanation: 'In diesem Bereich säuern beide Kulturen (Sc und Lb) aktiv. Die genaue Temperatur beeinflusst das Verhältnis der beiden Bakterienarten.'
  },
  {
    statement: 'Bei der Säuregerinnung vergären Milchsäurebakterien die Laktose zu Milchsäure, wodurch das Kasein gerinnt.',
    answer: true,
    explanation: 'Die Milchsäure neutralisiert die negativen Ladungen auf den Kaseinkügelchen – sie stossen sich nicht mehr ab und bilden ein Gallertgerüst.'
  },
  {
    statement: 'Stichfester Jogurt wird in der Endverpackung bebrütet.',
    answer: true,
    explanation: 'Deshalb darf die Gallerte nach dem Abfüllen nicht mehr bewegt werden – Erschütterungen führen zu Molkenabscheidung.'
  },
  {
    statement: 'Die Kühlung der Jogurtgallerte beginnt bei einem pH-Wert von 4,5.',
    answer: true,
    explanation: 'Bei pH 4,5 (entspricht 36–38 °SH) wird die Aktivität der Jogurtbakterien stark reduziert.'
  },
  {
    statement: 'Die Homogenisation darf nicht unter 65 °C durchgeführt werden.',
    answer: true,
    explanation: 'Unter 65 °C ist die milcheigene Lipase noch aktiv und würde innerhalb von Minuten Ranzigkeit verursachen.'
  },
  {
    statement: 'Kefir enthält einen geringen Alkoholgehalt von 0,2–1,5 %.',
    answer: true,
    explanation: 'Milchzuckervergärende Hefen im Kefir produzieren neben Kohlendioxid auch Alkohol aus Laktose.'
  },
  {
    statement: 'Ein hoher Lactobacillen-Anteil in der Kultur fördert das Nachsäuern.',
    answer: true,
    explanation: 'Lactobacillen sind für die Endsäure zuständig und neigen zum Nachsäuern. Kulturen mit wenig Lb ergeben milderen Jogurt.'
  },
  {
    statement: 'Für die Herstellung von Sauermilch schreibt die VLtH bestimmte Mikroorganismen vor.',
    answer: false,
    explanation: 'Im Gegensatz zu Jogurt verlangt die VLtH für Sauermilch nur, dass die Mikroorganismen «geeignet» sind – keine Vorschrift für bestimmte Arten.'
  },
  {
    statement: 'Jogurt darf nach dem Bebrüten pasteurisiert werden, solange die Textur erhalten bleibt.',
    answer: false,
    explanation: 'Nicht möglich – durch die Pasteurisierung würden die Bakterien abgetötet und die gesetzliche Mindestmenge von 10 Mio. KBE/g wäre unterschritten.'
  },
  {
    statement: 'Flüssige Betriebskultur wird in einer Menge von 5 % zur Jogurtmilch hinzugegeben.',
    answer: false,
    explanation: 'Der Richtwert beträgt 2 % Betriebskultur. Bei Direktstarterkulturen gelten die Angaben des Herstellers.'
  },
  {
    statement: 'Gerührter Jogurt wird – wie stichfester Jogurt – in der Endverpackung bebrütet.',
    answer: false,
    explanation: 'Nur stichfester Jogurt wird in der Endverpackung bebrütet. Bei gerührtem Jogurt findet die Bebrütung im Tank statt, anschliessend wird die Gallerte aufgerührt.'
  },
  {
    statement: 'Probiotische Mikroorganismen haben ihr Temperaturoptimum zwischen 45 und 50 °C.',
    answer: false,
    explanation: 'Das Temperaturoptimum probiotischer Mikroorganismen liegt bei 35–38 °C – also tiefer als das der klassischen Jogurtbakterien.'
  },
  {
    statement: 'Fruchtgrundstoffe bestehen hauptsächlich aus Früchten; Zucker ist nur in geringer Menge enthalten.',
    answer: false,
    explanation: 'Fruchtgrundstoffe bestehen ungefähr je zur Hälfte aus Zucker und Früchten.'
  },
  {

    answer: false,
    explanation: 'Das Gegenteil ist richtig: Erschütterungen und Fliessbewegungen stören die Gallertbildung und führen zu Molkenabscheidung oder Griessigkeit.'
  },
  {

    answer: false,
    explanation: 'Das Mischungsverhältnis beträgt 2:1 bis 1:1 (Jogurt zu Wasser), mit etwas Salz.'
  },
  {
    statement: 'Der Homogenisationsdruck bei der Jogurtherstellung beträgt 50–80 bar.',
    answer: false,
    explanation: 'Der empfohlene Homogenisationsdruck liegt bei 180–220 bar. Bereits ab 100 bar wäre die Aufrahmung verhindert, aber für die Molkenbindung sind 180–220 bar nötig.'
  },
  {
    statement: 'Kefir stammt ursprünglich aus Bulgarien.',
    answer: false,
    explanation: 'Kefir stammt aus dem Kaukasus. Jogurt hingegen stammt aus Bulgarien.'

];

var deck = [];
var current = 0;
var scoreCorrect = 0;
var scoreWrong   = 0;

// Drag state
var dragging   = false;
var startX     = 0;
var currentX   = 0;
var topCard    = null;
var toastTimer = null;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startGame() {
  deck = shuffle(CARDS);
  current = 0;
  scoreCorrect = 0;
  scoreWrong   = 0;
  document.getElementById('scoreCorrect').textContent = '0';
  document.getElementById('scoreWrong').textContent   = '0';
  document.getElementById('endScreen').className = 'end-screen';
  document.getElementById('cardStack').style.display = '';
  document.querySelector('.action-btns').style.display = '';
  buildStack();
}

function buildStack() {
  var stack = document.getElementById('cardStack');
  stack.innerHTML = '';

  // Show up to 3 cards (current, current+1, current+2)
  for (var i = Math.min(current + 2, deck.length - 1); i >= current; i--) {
    var card = createCardEl(i);
    if (i === current) {
      card.classList.add('top');
      attachDrag(card);
      topCard = card;
    } else if (i === current + 1) {
      card.classList.add('behind-1');
    } else {
      card.classList.add('behind-2');
    }
    stack.appendChild(card);
  }

  document.getElementById('cardNum').textContent = current + 1;
}

function createCardEl(idx) {
  var card = document.createElement('div');
  card.className = 'swipe-card';

  var num = document.createElement('div');
  num.className = 'card-number';
  num.textContent = 'Aussage ' + (idx + 1) + ' von 20';

  var stmt = document.createElement('div');
  stmt.className = 'card-statement';
  stmt.textContent = deck[idx].statement;

  var vW = document.createElement('div');
  vW.className = 'vote-overlay vote-wahr';
  vW.textContent = 'WAHR';

  var vF = document.createElement('div');
  vF.className = 'vote-overlay vote-falsch';
  vF.textContent = 'FALSCH';

  card.appendChild(num);
  card.appendChild(stmt);
  card.appendChild(vW);
  card.appendChild(vF);
  return card;
}

function attachDrag(card) {
  // Mouse
  card.addEventListener('mousedown', function(e) {
    dragging = true;
    startX   = e.clientX;
    card.classList.remove('snapping');
  });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);

  // Touch
  card.addEventListener('touchstart', function(e) {
    dragging = true;
    startX   = e.touches[0].clientX;
    card.classList.remove('snapping');
  }, {passive: true});
  document.addEventListener('touchmove', onMoveTouch, {passive: true});
  document.addEventListener('touchend',  onEndTouch);
}

function onMove(e) {
  if (!dragging || !topCard) return;
  currentX = e.clientX - startX;
  updateCardPos();
}
function onMoveTouch(e) {
  if (!dragging || !topCard) return;
  currentX = e.touches[0].clientX - startX;
  updateCardPos();
}

function updateCardPos() {
  var rotate  = currentX / 12;
  var opacity = Math.min(Math.abs(currentX) / 80, 1);
  topCard.style.transform = 'translateX(' + currentX + 'px) rotate(' + rotate + 'deg)';

  var vW = topCard.querySelector('.vote-wahr');
  var vF = topCard.querySelector('.vote-falsch');
  if (currentX > 0) {
    vW.style.opacity = opacity;
    vF.style.opacity = 0;
  } else {
    vF.style.opacity = opacity;
    vW.style.opacity = 0;
  }
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  finishDrag();
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup',   onEnd);
}
function onEndTouch() {
  if (!dragging) return;
  dragging = false;
  finishDrag();
  document.removeEventListener('touchmove', onMoveTouch);
  document.removeEventListener('touchend',  onEndTouch);
}

function finishDrag() {
  if (!topCard) return;
  if (Math.abs(currentX) > 80) {
    swipe(currentX > 0 ? 'right' : 'left');
  } else {
    // Snap back
    topCard.classList.add('snapping');
    topCard.style.transform = '';
    topCard.querySelector('.vote-wahr').style.opacity = 0;
    topCard.querySelector('.vote-falsch').style.opacity = 0;
  }
  currentX = 0;
}

function swipe(dir) {
  if (!topCard || current >= deck.length) return;

  var answered = dir === 'right'; // true = Wahr, false = Falsch
  var correct  = answered === deck[current].answer;

  if (correct) scoreCorrect++;
  else         scoreWrong++;

  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent   = scoreWrong;

  // Show overlays fully
  topCard.querySelector('.vote-wahr').style.opacity   = dir === 'right' ? 1 : 0;
  topCard.querySelector('.vote-falsch').style.opacity = dir === 'left'  ? 1 : 0;

  // Fly out
  var flyClass = dir === 'right' ? 'flying-right' : 'flying-left';
  topCard.classList.add(flyClass);
  topCard.style.transform = 'translateX(' + (dir === 'right' ? '150%' : '-150%') + ') rotate(' + (dir === 'right' ? 25 : -25) + 'deg)';
  topCard.style.opacity   = '0';

  showFeedback(correct, deck[current].explanation);

  current++;
  var cardRef = topCard;
  topCard = null;

  setTimeout(function() {
    cardRef.remove();
    if (current < deck.length) {
      buildStack();
    } else {
      showEnd();
    }
  }, 380);
}

function showFeedback(correct, text) {
  var toast = document.getElementById('feedbackToast');
  var label = document.getElementById('feedbackLabel');
  var msg   = document.getElementById('feedbackText');

  clearTimeout(toastTimer);
  toast.className = 'feedback-toast';
  label.className = 'feedback-label ' + (correct ? 'correct' : 'wrong');
  label.textContent = correct ? 'Richtig!' : 'Falsch!';
  msg.textContent   = text;

  requestAnimationFrame(function() {
    toast.classList.add('show', correct ? 'correct' : 'wrong');
  });

  toastTimer = setTimeout(function() {
    toast.classList.remove('show');
  }, 2800);
}

function showEnd() {
  document.getElementById('cardStack').style.display = 'none';
  document.querySelector('.action-btns').style.display = 'none';

  var pct = Math.round(scoreCorrect / CARDS.length * 100);
  document.getElementById('endScore').innerHTML = scoreCorrect + ' <span>/ 20</span>';
  document.getElementById('endMsg').textContent =
    pct >= 85 ? 'Ausgezeichnet! Du kennst die Sauermilchprodukte sehr gut.' :
    pct >= 60 ? 'Gut gemacht! Einige Punkte nochmals wiederholen.' :
                'Übe weiter – schau nochmals ins Lehrmittel.';
  document.getElementById('endScreen').className = 'end-screen show';
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') swipe('right');
  if (e.key === 'ArrowLeft')  swipe('left');
});

startGame();
</script>

</body>
</html>
