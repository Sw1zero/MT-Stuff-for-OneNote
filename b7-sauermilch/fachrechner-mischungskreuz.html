<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fachrechner b.7 – Mischungskreuz</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 56px;
    }

    .back-link {
      font-size: 0.78rem;
      color: var(--text-subtle);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 20px;
      align-self: flex-start;
    }
    .back-link:hover { color: var(--red); }

    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .page-header p { font-size: 0.82rem; color: var(--text-subtle); }

    .calc-wrap {
      width: 520px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ---- Presets ---- */
    .preset-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-subtle);
      margin-bottom: 8px;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preset-btn {
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover {
      border-color: var(--red);
      color: var(--red-dark);
      background: var(--red-light);
    }

    /* ---- Input card ---- */
    .input-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 24px 24px 20px;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 10px 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .input-row { display: flex; flex-direction: column; gap: 4px; }

    label {
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"], input[type="number"] {
      font-family: var(--font);
      font-size: 0.92rem;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      background: #f8fafc;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--surface);
    }

    .unit-label {
      font-size: 0.84rem;
      color: var(--text-muted);
      padding: 9px 0 9px 2px;
      white-space: nowrap;
    }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 0.72rem;
      color: var(--text-subtle);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .total-row {
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 10px 12px;
      align-items: end;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .optional-note {
      font-size: 0.72rem;
      color: var(--text-subtle);
      margin-top: 3px;
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--red-dark);
      background: var(--red-light);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ---- Mischungskreuz SVG ---- */
    .cross-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: none;
    }

    .cross-card.visible { display: block; }

    .cross-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-subtle);
      margin-bottom: 16px;
    }

    .cross-svg-wrap {
      display: flex;
      justify-content: center;
    }

    /* ---- Results ---- */
    .result-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: none;
    }

    .result-card.visible { display: block; }

    .result-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-subtle);
      margin-bottom: 16px;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .result-table th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-subtle);
      padding: 0 8px 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-table td {
      padding: 10px 8px 10px 0;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text);
    }

    .result-table tr:last-child td { border-bottom: none; }

    .result-table .val {
      font-weight: 700;
      color: var(--red-dark);
      font-size: 1rem;
    }

    .result-table .total-row-result td {
      font-weight: 600;
      background: #f8fafc;
      border-radius: 6px;
    }

    /* ---- Steps ---- */
    .steps-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: none;
    }

    .steps-card.visible { display: block; }

    .steps-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-subtle);
      margin-bottom: 14px;
    }

    .step-list-calc {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .calc-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .calc-step-num {
      width: 22px;
      height: 22px;
      background: var(--red-light);
      color: var(--red-dark);
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .calc-step-text {
      font-size: 0.86rem;
      color: var(--text);
      line-height: 1.5;
    }

    .calc-step-text code {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--font);
      font-size: 0.84rem;
      color: var(--blue-dark);
    }

    .probe-box {
      margin-top: 14px;
      padding: 12px 14px;
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: #276749;
      line-height: 1.55;
    }

    .probe-box strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>

  <div class="page-header">
    <h1>b.7 – Mischungskreuz</h1>
    <p>Zwei Komponenten mischen, um einen Zielwert zu erreichen.</p>
  </div>

  <div class="calc-wrap">

    <!-- Presets -->
    <div>
      <div class="preset-label">Schnellbeispiele</div>
      <div class="preset-row">
        <button class="preset-btn" onclick="loadPreset('fett')">Fettgehalt standardisieren</button>
        <button class="preset-btn" onclick="loadPreset('frucht')">Fruchtgrundstoff beimischen</button>
        <button class="preset-btn" onclick="loadPreset('zucker')">Zucker beimischen</button>
      </div>
    </div>

    <!-- Inputs -->
    <div class="input-card">

      <div class="input-grid">
        <div class="input-row">
          <label>Komponente A – Name</label>
          <input type="text" id="nameA" placeholder="z. B. Vollmilch">
        </div>
        <div></div>

        <div class="input-row">
          <label>Wert Komponente A</label>
          <input type="number" id="valueA" placeholder="3.8" step="0.01" min="0">
        </div>
        <div class="input-row">
          <label>&nbsp;</label>
          <div class="unit-label" id="unitA">%</div>
        </div>
      </div>

      <div class="divider-row">
        <div class="divider-line"></div>
        <div class="divider-label">Zielwert</div>
        <div class="divider-line"></div>
      </div>

      <div class="input-grid" style="margin-top:12px;">
        <div class="input-row">
          <label>Zielwert</label>
          <input type="number" id="target" placeholder="1.5" step="0.01" min="0">
        </div>
        <div class="input-row">
          <label>&nbsp;</label>
          <div class="unit-label" id="unitTarget">%</div>
        </div>
      </div>

      <div class="divider-row" style="margin-top:12px;">
        <div class="divider-line"></div>
        <div class="divider-label">&nbsp;</div>
        <div class="divider-line"></div>
      </div>

      <div class="input-grid" style="margin-top:12px;">
        <div class="input-row">
          <label>Komponente B – Name</label>
          <input type="text" id="nameB" placeholder="z. B. Magermilch">
        </div>
        <div></div>

        <div class="input-row">
          <label>Wert Komponente B</label>
          <input type="number" id="valueB" placeholder="0.05" step="0.01" min="0">
        </div>
        <div class="input-row">
          <label>&nbsp;</label>
          <div class="unit-label" id="unitB">%</div>
        </div>
      </div>

      <div class="total-row" style="margin-top:16px;">
        <div class="input-row">
          <label>Gesamtmenge <span style="font-weight:400; text-transform:none; letter-spacing:0">(optional)</span></label>
          <input type="number" id="totalQty" placeholder="100" step="0.1" min="0">
          <div class="optional-note">Wenn angegeben, werden die Mengen in kg berechnet.</div>
        </div>
        <div class="input-row">
          <label>&nbsp;</label>
          <div class="unit-label">kg</div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="calculate()" style="flex:1">Berechnen</button>
        <button class="btn btn-ghost" onclick="resetAll()">Zurücksetzen</button>
      </div>

    </div>

    <!-- Mischungskreuz visual -->
    <div class="cross-card" id="crossCard">
      <div class="cross-title">Mischungskreuz</div>
      <div class="cross-svg-wrap">
        <svg id="crossSvg" viewBox="0 0 460 200" width="460" style="max-width:100%;" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"></svg>
      </div>
    </div>

    <!-- Results table -->
    <div class="result-card" id="resultCard">
      <div class="result-title">Ergebnis</div>
      <table class="result-table" id="resultTable"></table>
    </div>

    <!-- Calculation steps -->
    <div class="steps-card" id="stepsCard">
      <div class="steps-title">Rechenweg</div>
      <div class="step-list-calc" id="stepListCalc"></div>
    </div>

  </div>

  <script>
    const PRESETS = {
      fett: {
        nameA: 'Vollmilch', valueA: 3.8,
        nameB: 'Magermilch', valueB: 0.05,
        target: 1.5, totalQty: 100,
        unit: '% Fett'
      },
      frucht: {
        nameA: 'Fruchtgrundstoff', valueA: 100,
        nameB: 'Nature-Jogurt', valueB: 0,
        target: 8, totalQty: 100,
        unit: '% Fruchtanteil'
      },
      zucker: {
        nameA: 'Zucker', valueA: 100,
        nameB: 'Nature-Jogurt', valueB: 0,
        target: 6, totalQty: 100,
        unit: '% Zucker'
      }
    };

    function loadPreset(key) {
      const p = PRESETS[key];
      document.getElementById('nameA').value    = p.nameA;
      document.getElementById('valueA').value   = p.valueA;
      document.getElementById('nameB').value    = p.nameB;
      document.getElementById('valueB').value   = p.valueB;
      document.getElementById('target').value   = p.target;
      document.getElementById('totalQty').value = p.totalQty;
      calculate();
    }

    function r(n, dec = 2) {
      return parseFloat(n.toFixed(dec));
    }

    function calculate() {
      const nameA = document.getElementById('nameA').value.trim() || 'Komponente A';
      const nameB = document.getElementById('nameB').value.trim() || 'Komponente B';
      const a     = parseFloat(document.getElementById('valueA').value);
      const b     = parseFloat(document.getElementById('valueB').value);
      const c     = parseFloat(document.getElementById('target').value);
      const total = parseFloat(document.getElementById('totalQty').value) || null;

      const err = document.getElementById('errorMsg');
      err.classList.remove('visible');

      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        err.textContent = 'Bitte Werte für beide Komponenten und den Zielwert eingeben.';
        err.classList.add('visible');
        hideResults();
        return;
      }

      if (a === b) {
        err.textContent = 'Die beiden Komponentenwerte dürfen nicht gleich sein.';
        err.classList.add('visible');
        hideResults();
        return;
      }

      const lo = Math.min(a, b);
      const hi = Math.max(a, b);

      if (c <= lo || c >= hi) {
        err.textContent = `Der Zielwert (${c}) muss zwischen den Komponentenwerten (${lo} und ${hi}) liegen.`;
        err.classList.add('visible');
        hideResults();
        return;
      }

      // Mischungskreuz
      // Parts of A = |c - b|, Parts of B = |a - c|
      const partsA = Math.abs(c - b);
      const partsB = Math.abs(a - c);
      const partsTotal = partsA + partsB;

      const pctA = (partsA / partsTotal) * 100;
      const pctB = (partsB / partsTotal) * 100;

      const amountA = total ? (partsA / partsTotal) * total : null;
      const amountB = total ? (partsB / partsTotal) * total : null;

      // Draw cross
      drawCross(nameA, a, nameB, b, c, partsA, partsB);

      // Results table
      buildResultTable(nameA, a, partsA, pctA, amountA, nameB, b, partsB, pctB, amountB, partsTotal, total, c, a, b);

      // Steps
      buildSteps(nameA, a, nameB, b, c, partsA, partsB, partsTotal, pctA, pctB, amountA, amountB, total);

      document.getElementById('crossCard').classList.add('visible');
      document.getElementById('resultCard').classList.add('visible');
      document.getElementById('stepsCard').classList.add('visible');
    }

    function drawCross(nameA, a, nameB, b, c, partsA, partsB) {
      const svg = document.getElementById('crossSvg');

      const lA    = nameA.length > 18 ? nameA.substring(0, 16) + '…' : nameA;
      const lB    = nameB.length > 18 ? nameB.substring(0, 16) + '…' : nameB;
      const col   = { red: '#C40027', blue: '#0066CC', gray: '#718096', light: '#e2e8f0' };

      svg.innerHTML = `
        <!-- Cross lines -->
        <line x1="160" y1="40"  x2="230" y2="100" stroke="${col.light}" stroke-width="2"/>
        <line x1="160" y1="160" x2="230" y2="100" stroke="${col.light}" stroke-width="2"/>
        <line x1="300" y1="40"  x2="230" y2="100" stroke="${col.light}" stroke-width="2"/>
        <line x1="300" y1="160" x2="230" y2="100" stroke="${col.light}" stroke-width="2"/>

        <!-- Diagonal lines (the actual cross) -->
        <line x1="162" y1="42"  x2="298" y2="158" stroke="${col.blue}" stroke-width="1.5" stroke-dasharray="5,3"/>
        <line x1="162" y1="158" x2="298" y2="42"  stroke="${col.red}"  stroke-width="1.5" stroke-dasharray="5,3"/>

        <!-- Center circle -->
        <circle cx="230" cy="100" r="28" fill="white" stroke="${col.light}" stroke-width="1.5"/>
        <text x="230" y="96"  text-anchor="middle" font-size="11" font-weight="700" fill="${col.gray}">Ziel</text>
        <text x="230" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="${col.blue}">${r(c, 3)}</text>

        <!-- Component A (top left) -->
        <rect x="2" y="22" width="152" height="36" rx="8" fill="#f8fafc" stroke="${col.light}" stroke-width="1.2"/>
        <text x="10" y="37" font-size="10" fill="${col.gray}">${lA}</text>
        <text x="10" y="51" font-size="13" font-weight="700" fill="${col.blue}">${r(a, 3)}</text>

        <!-- Component B (bottom left) -->
        <rect x="2" y="142" width="152" height="36" rx="8" fill="#f8fafc" stroke="${col.light}" stroke-width="1.2"/>
        <text x="10" y="157" font-size="10" fill="${col.gray}">${lB}</text>
        <text x="10" y="171" font-size="13" font-weight="700" fill="${col.red}">${r(b, 3)}</text>

        <!-- Parts A (top right) -->
        <rect x="306" y="22" width="150" height="36" rx="8" fill="${'#dbeeff'}" stroke="${col.blue}" stroke-width="1.2"/>
        <text x="314" y="37" font-size="10" fill="${col.blue}">Teile ${lA}</text>
        <text x="314" y="51" font-size="13" font-weight="700" fill="${col.blue}">${r(partsA, 3)}</text>

        <!-- Parts B (bottom right) -->
        <rect x="306" y="142" width="150" height="36" rx="8" fill="${'#fde8ed'}" stroke="${col.red}" stroke-width="1.2"/>
        <text x="314" y="157" font-size="10" fill="${col.red}">Teile ${lB}</text>
        <text x="314" y="171" font-size="13" font-weight="700" fill="${col.red}">${r(partsB, 3)}</text>

        <!-- Arrow labels -->
        <text x="186" y="64"  font-size="9" fill="${col.gray}" transform="rotate(-34 186 64)">c − b</text>
        <text x="186" y="150" font-size="9" fill="${col.gray}" transform="rotate(34 186 150)">a − c</text>
      `;
    }

    function buildResultTable(nameA, a, partsA, pctA, amountA, nameB, b, partsB, pctB, amountB, partsTotal, total, c) {
      const hasTot = total !== null;
      const t = document.getElementById('resultTable');
      t.innerHTML = `
        <thead>
          <tr>
            <th>Komponente</th>
            <th>Wert</th>
            <th>Teile</th>
            <th>Anteil</th>
            ${hasTot ? '<th>Menge (kg)</th>' : ''}
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${nameA}</td>
            <td>${r(a, 3)}</td>
            <td>${r(partsA, 3)}</td>
            <td class="val">${r(pctA, 1)} %</td>
            ${hasTot ? `<td class="val">${r(amountA, 2)} kg</td>` : ''}
          </tr>
          <tr>
            <td>${nameB}</td>
            <td>${r(b, 3)}</td>
            <td>${r(partsB, 3)}</td>
            <td class="val">${r(pctB, 1)} %</td>
            ${hasTot ? `<td class="val">${r(amountB, 2)} kg</td>` : ''}
          </tr>
          <tr class="total-row-result">
            <td><strong>Total</strong></td>
            <td>—</td>
            <td>${r(partsTotal, 3)}</td>
            <td>100 %</td>
            ${hasTot ? `<td>${r(total, 2)} kg</td>` : ''}
          </tr>
        </tbody>
      `;
    }

    function buildSteps(nameA, a, nameB, b, c, partsA, partsB, partsTotal, pctA, pctB, amountA, amountB, total) {
      const hasTot = total !== null;
      const steps = [
        {
          text: `Teile von <strong>${nameA}</strong> (oben im Kreuz):<br>
                 <code>${r(c,3)} − ${r(b,3)} = <strong>${r(partsA,3)}</strong></code>
                 &nbsp;(Zielwert minus Wert Komponente B)`
        },
        {
          text: `Teile von <strong>${nameB}</strong> (unten im Kreuz):<br>
                 <code>${r(a,3)} − ${r(c,3)} = <strong>${r(partsB,3)}</strong></code>
                 &nbsp;(Wert Komponente A minus Zielwert)`
        },
        {
          text: `Summe der Teile:<br>
                 <code>${r(partsA,3)} + ${r(partsB,3)} = <strong>${r(partsTotal,3)}</strong></code>`
        },
        {
          text: `Anteil <strong>${nameA}</strong>:<br>
                 <code>${r(partsA,3)} ÷ ${r(partsTotal,3)} × 100 = <strong>${r(pctA,2)} %</strong></code>`
        },
        {
          text: `Anteil <strong>${nameB}</strong>:<br>
                 <code>${r(partsB,3)} ÷ ${r(partsTotal,3)} × 100 = <strong>${r(pctB,2)} %</strong></code>`
        },
        ...(hasTot ? [{
          text: `Mengen für ${r(total,2)} kg Gesamtmenge:<br>
                 <code>${nameA}: ${r(pctA/100,4)} × ${r(total,2)} = <strong>${r(amountA,2)} kg</strong></code><br>
                 <code>${nameB}: ${r(pctB/100,4)} × ${r(total,2)} = <strong>${r(amountB,2)} kg</strong></code>`
        }] : [])
      ];

      const probeA = hasTot ? r(amountA * a / total, 3) : r(pctA/100 * a, 3);
      const probeB = hasTot ? r(amountB * b / total, 3) : r(pctB/100 * b, 3);
      const probeSum = r(probeA + probeB, 3);

      const container = document.getElementById('stepListCalc');
      container.innerHTML = steps.map((s, i) => `
        <div class="calc-step">
          <div class="calc-step-num">${i + 1}</div>
          <div class="calc-step-text">${s.text}</div>
        </div>
      `).join('');

      container.innerHTML += `
        <div class="probe-box">
          <strong>&#10003; Probe</strong>
          ${hasTot
            ? `${r(amountA,2)} kg × ${r(a,3)} + ${r(amountB,2)} kg × ${r(b,3)} = ${probeA} + ${probeB} = <strong>${probeSum}</strong> (geteilt durch ${r(total,2)} kg = ${r(probeSum/total,3)}, Zielwert: ${r(c,3)} ✓)`
            : `${r(pctA/100,4)} × ${r(a,3)} + ${r(pctB/100,4)} × ${r(b,3)} = ${probeA} + ${probeB} = <strong>${probeSum}</strong> (Zielwert: ${r(c,3)} ✓)`
          }
        </div>
      `;
    }

    function hideResults() {
      ['crossCard','resultCard','stepsCard'].forEach(id =>
        document.getElementById(id).classList.remove('visible'));
    }

    function resetAll() {
      ['nameA','valueA','nameB','valueB','target','totalQty'].forEach(id =>
        document.getElementById(id).value = '');
      document.getElementById('errorMsg').classList.remove('visible');
      hideResults();
    }
  </script>
</body>
</html>
