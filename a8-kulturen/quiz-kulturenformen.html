<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz a.8 – Kulturenformen</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .back-link { font-size:0.82rem; color:var(--text-muted); text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:20px; }
    .back-link:hover { color:var(--red); }
    .quiz-center { display:flex; flex-direction:column; align-items:center; }
    .progress-text { margin-bottom:10px; }
    .progress-bar-wrap { width:480px; max-width:92vw; margin-bottom:28px; }
    .quiz-card { width:480px; max-width:92vw; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:32px 32px 28px; margin-bottom:16px; }
    .question-badge { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--red); margin-bottom:12px; display:block; }
    .question-text { font-size:1.02rem; font-weight:600; line-height:1.5; color:var(--text); margin-bottom:24px; }
    .answers { display:flex; flex-direction:column; gap:10px; }
    .answer-btn { font-family:var(--font); font-size:0.9rem; font-weight:500; text-align:left; background:#f8fafc; border:1.5px solid var(--border); border-radius:var(--radius-md); padding:12px 16px; cursor:pointer; transition:border-color 0.15s, background 0.15s, transform 0.1s; line-height:1.4; color:var(--text); display:flex; gap:12px; align-items:flex-start; }
    .answer-btn:hover:not(:disabled) { border-color:var(--red); background:var(--red-light); }
    .answer-btn:active:not(:disabled) { transform:scale(0.99); }
    .answer-btn .letter { font-weight:700; font-size:0.78rem; background:var(--border); color:var(--text-muted); border-radius:6px; padding:2px 7px; flex-shrink:0; margin-top:1px; transition:background 0.15s, color 0.15s; }
    .answer-btn.correct { border-color:#38a169; background:#f0fff4; }
    .answer-btn.correct .letter { background:#38a169; color:#fff; }
    .answer-btn.wrong { border-color:var(--red); background:var(--red-light); }
    .answer-btn.wrong .letter { background:var(--red); color:#fff; }
    .answer-btn.reveal { border-color:#38a169; background:#f0fff4; opacity:0.8; }
    .answer-btn.reveal .letter { background:#38a169; color:#fff; }
    .answer-btn:disabled { cursor:default; }
    .feedback { margin-top:18px; padding:14px 16px; border-radius:var(--radius-md); font-size:0.88rem; line-height:1.5; display:none; }
    .feedback.correct { background:#f0fff4; border:1px solid #9ae6b4; color:#276749; display:block; }
    .feedback.wrong { background:var(--red-light); border:1px solid #fca5a5; color:var(--red-dark); display:block; }
    .feedback-icon { font-size:1rem; margin-right:6px; }
    .next-wrap { width:480px; max-width:92vw; display:flex; justify-content:flex-end; }
    .end-screen { width:480px; max-width:92vw; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:40px 36px; text-align:center; display:none; }
    .score-circle { width:100px; height:100px; border-radius:50%; border:5px solid var(--red); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 24px; }
    .score-number { font-size:2rem; font-weight:700; color:var(--red); line-height:1; }
    .score-total { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
    .end-message { font-size:1.05rem; font-weight:600; color:var(--text); margin-bottom:8px; }
    .end-sub { font-size:0.86rem; color:var(--text-muted); margin-bottom:28px; }
    .end-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>

<header class="bzwu-header">
  <div class="header-text">
    <span class="school-badge">BZWU Wil-Uzwil · Milchtechnologie EFZ · a.8</span>
    <h1>Kulturenformen</h1>
    <p>Vor-/Nachteile, Handhabung, Lagerung & Einsatz</p>
  </div>
  <div class="header-logos">
    <img src="../assets/logos/bzwu.png" alt="BZWU" class="header-logo">
    <img src="../assets/logos/milchtechnologen.svg" alt="Milchtechnologen" class="header-logo">
  </div>
</header>

<main class="page-main">
  <a class="back-link" href="../index.html">&#8592; Alle Lerntools</a>
  <div class="quiz-center">
    <div class="progress-text" id="progressText"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="quiz-card" id="quizCard">
      <span class="question-badge" id="questionBadge"></span>
      <div class="question-text" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="next-wrap" id="nextWrap" style="display:none">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Weiter &#8594;</button>
    </div>
    <div class="end-screen" id="endScreen">
      <div class="score-circle"><div class="score-number" id="scoreNumber"></div><div class="score-total" id="scoreTotal"></div></div>
      <div class="end-message" id="endMessage"></div>
      <div class="end-sub" id="endSub"></div>
      <div class="end-actions">
        <button class="btn btn-ghost" onclick="location.href='../index.html'">&#8592; Alle Lerntools</button>
        <button class="btn btn-primary" onclick="restartQuiz()">Nochmals versuchen</button>
      </div>
    </div>
  </div>
</main>

<footer class="bzwu-footer">
  BZWU Wil-Uzwil · Milchtechnologie EFZ · Philipp Neukomm
</footer>

<script>
  const QUESTIONS = [
    { badge:"Flüssigkultur", question:"Was ist ein Vorteil der Flüssigkultur?",
      answers:["Sehr gute, sofortige Aktivitätsbereitschaft","Monatelange Lagerung bei Raumtemperatur","Unempfindlich gegen Temperaturschwankungen","Keine Infektionsgefahr bei der Herstellung"],
      correct:0, explanation:"Sobald das Medium beimpft ist, beginnt die Vermehrung, die Flüssigkultur ist sofort aktiv und es gibt keine Artenverarmung durch Gefriertrocknung." },
    { badge:"Flüssigkultur", question:"Was ist ein Nachteil der Flüssigkultur?",
      answers:["Verzögerte Anfangsaktivität","Nur kurze Lagerung (MSB bei <5 °C nur 7–10 Tage)","Floraverarmung durch Gefriertrocknung","Nicht selbst vermehrbar"],
      correct:1, explanation:"Flüssigkulturen sind temperaturempfindlich und nur kurz lagerfähig: MSB-Kulturen bei <5 °C ca. 7–10 Tage." },
    { badge:"Fettsirtenkultur", question:"Was ist eine Fettsirtenkultur?",
      answers:["Eine gefriergetrocknete Direktstarterkultur","Eine betriebsabhängige Flüssigkultur auf betriebseigener Fettsirte","Eine tiefgefrorene Granulatkultur","Eine Oberflächenreifungskultur"],
      correct:1, explanation:"Die Fettsirtenkultur ist eine betriebsabhängige (betriebseigene) Flüssigkultur. Basis ist die betriebseigene Fettsirte, die 6–20 h bei 32–38 °C bebrütet wird." },
    { badge:"Lyophilisiert", question:"Was bedeutet «lyophilisierte» Kultur?",
      answers:["Tiefgefroren in Aludosen","Gefriergetrocknet (Sublimationstrocknung)","In Flüssigstickstoff gelagert","Pasteurisiert"],
      correct:1, explanation:"Lyophilisation = Gefriertrocknung (Sublimationstrocknung): die Kultur wird im Festzustand unter Vakuum getrocknet." },
    { badge:"Lyophilisiert", question:"Welches ist ein Vorteil lyophilisierter Kulturen?",
      answers:["Sofort voll aktiv ohne Startphase","Per Post lieferbar und lange haltbar, jederzeit verfügbar","Keine Floraverarmung","Keine Kühlung nötig"],
      correct:1, explanation:"Gefriergetrocknete Kulturen sind weniger temperaturempfindlich, per Post lieferbar und unter −18 °C mindestens 3 Monate haltbar, also jederzeit verfügbar." },
    { badge:"Lyophilisiert", question:"Welches ist ein Nachteil lyophilisierter Kulturen?",
      answers:["Ununterbrochene Kühlkette zwingend","Verzögerte Anfangsaktivität (Zellen müssen erst Wasser aufnehmen)","Sehr kurze Haltbarkeit","Nur in Flüssigform erhältlich"],
      correct:1, explanation:"Die getrockneten Zellen müssen sich erst durch Wasseraufnahme reaktivieren → verzögerte Startphase. Zudem werden v. a. Laktobazillen reduziert (Floraverarmung)." },
    { badge:"Gefrorene Kultur", question:"Warum haben gefrorene Kulturen eine «normale» Aktivität?",
      answers:["Weil sie pasteurisiert sind","Weil in den Zellen noch Restflüssigkeit vorhanden ist","Weil sie keine Laktobazillen enthalten","Weil sie bei Raumtemperatur gelagert werden"],
      correct:1, explanation:"Durch die in den Bakterienzellen vorhandene Restflüssigkeit sind gefrorene Kulturen sofort normal aktiv (keine lange Reaktivierung nötig)." },
    { badge:"Gefrorene Kultur", question:"Was ist der wichtigste Nachteil gefrorener Kulturen?",
      answers:["Verzögerte Startphase","Ununterbrochene Kühlhaltung während der Lagerung nötig","Sehr kurze Haltbarkeit von 7 Tagen","Nur als Flüssigkeit lieferbar"],
      correct:1, explanation:"Gefrorene Kulturen verlangen eine lückenlose Kühlkette. Die Haltbarkeit hängt stark von der Lagertemperatur ab (z. B. −45 °C ≥ 3 Monate, −196 °C bis zu 1 Jahr)." },
    { badge:"Lagerung", question:"Worauf muss bei der Lagerung ALLER Kulturen geachtet werden?",
      answers:["Möglichst hohe Temperatur","Einwandfreie Hygiene und Einhalten der Lagertemperatur","Lagerung im Fabrikationsraum","Regelmässiges Öffnen der Gefässe"],
      correct:1, explanation:"Saubere Lagerräume verhindern Infektionen beim Impfen; die korrekten Lagertemperaturen sichern die bestmögliche Aktivität beim Einsatz." },
    { badge:"Betriebseigene Kultur", question:"Welcher Vorteil spricht für eine betriebseigene (selbst vermehrte) Flüssigkultur?",
      answers:["Kein Fachwissen nötig","Ständige Aktivitätskontrolle durch die laufende Weitervermehrung","Kein tägliches Infektionsrisiko","Keine Einrichtungen nötig"],
      correct:1, explanation:"Durch die ständige Weitervermehrung wird die Aktivität laufend überprüft; bei grossen Mengen kann sie zudem günstiger sein. Nachteil: täglicher Aufwand und Infektionsrisiko." },
  ];

  let currentIndex=0, score=0, answered=false, order=[];
  function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
  function startQuiz(){ order=shuffle([...Array(QUESTIONS.length).keys()]); currentIndex=0; score=0; document.getElementById("endScreen").style.display="none"; document.getElementById("quizCard").style.display="block"; showQuestion(); }
  function showQuestion(){
    answered=false; const q=QUESTIONS[order[currentIndex]]; const total=QUESTIONS.length;
    document.getElementById("progressText").textContent=`Frage ${currentIndex+1} von ${total}`;
    document.getElementById("progressBar").style.width=`${((currentIndex+1)/total)*100}%`;
    document.getElementById("questionBadge").textContent=q.badge;
    document.getElementById("questionText").textContent=q.question;
    const letters=["A","B","C","D"];
    document.getElementById("answersContainer").innerHTML=q.answers.map((a,i)=>`<button class="answer-btn" onclick="selectAnswer(${i})" id="ans-${i}"><span class="letter">${letters[i]}</span><span>${a}</span></button>`).join("");
    const fb=document.getElementById("feedback"); fb.className="feedback"; fb.textContent="";
    document.getElementById("nextWrap").style.display="none";
    document.getElementById("nextBtn").textContent=currentIndex<QUESTIONS.length-1?"Weiter →":"Ergebnis anzeigen";
  }
  function selectAnswer(chosen){
    if(answered) return; answered=true;
    const q=QUESTIONS[order[currentIndex]]; const correct=q.correct; const isCorrect=chosen===correct; if(isCorrect) score++;
    for(let i=0;i<q.answers.length;i++){ const btn=document.getElementById(`ans-${i}`); btn.disabled=true;
      if(i===correct&&i===chosen) btn.classList.add("correct"); else if(i===chosen&&!isCorrect) btn.classList.add("wrong"); else if(i===correct) btn.classList.add("reveal"); }
    const fb=document.getElementById("feedback");
    if(isCorrect){ fb.className="feedback correct"; fb.innerHTML=`<span class="feedback-icon">&#10003;</span><strong>Richtig!</strong> ${q.explanation}`; }
    else { fb.className="feedback wrong"; fb.innerHTML=`<span class="feedback-icon">&#10007;</span><strong>Nicht ganz.</strong> ${q.explanation}`; }
    document.getElementById("nextWrap").style.display="flex";
  }
  function nextQuestion(){ currentIndex++; if(currentIndex>=QUESTIONS.length) showEndScreen(); else showQuestion(); }
  function showEndScreen(){
    document.getElementById("quizCard").style.display="none"; document.getElementById("nextWrap").style.display="none";
    document.getElementById("progressText").textContent=""; document.getElementById("progressBar").style.width="100%";
    const total=QUESTIONS.length; const pct=Math.round((score/total)*100);
    document.getElementById("scoreNumber").textContent=score; document.getElementById("scoreTotal").textContent=`von ${total}`;
    let msg,sub;
    if(pct===100){ msg="Ausgezeichnet!"; sub="Alle Fragen richtig. Sie kennen die Kulturenformen bestens."; }
    else if(pct>=75){ msg="Sehr gut!"; sub="Fast alle Fragen richtig. Wiederholen Sie die markierten Themen kurz."; }
    else if(pct>=50){ msg="Gut gemacht."; sub="Mehr als die Hälfte richtig. Schauen Sie die falschen Antworten nochmals an."; }
    else { msg="Weiter üben."; sub="Wiederholen Sie die Kulturenformen und versuchen Sie es nochmals."; }
    document.getElementById("endMessage").textContent=msg; document.getElementById("endSub").textContent=sub;
    document.getElementById("endScreen").style.display="block";
  }
  function restartQuiz(){ startQuiz(); }
  startQuiz();
</script>
</body>
</html>
